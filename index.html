<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Няня — Трекер смен</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#18181c;--surface2:#212126;--surface3:#2a2a30;
  --border:#2e2e36;--border2:#3d3d48;--text:#f0f0f4;--text2:#9090a0;--text3:#5a5a6a;
  --accent:#e8c84a;--green:#4ade80;--red:#f87171;--blue:#60a5fa;
  --radius:10px;--radius-lg:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Geologica',sans-serif;min-height:100vh;font-size:15px}
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:2rem}
.pin-logo{font-size:2.2rem;font-weight:600;letter-spacing:-0.03em;color:var(--accent);text-align:center}
.pin-sub{color:var(--text2);font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;text-align:center;margin-top:6px}
.pin-role-tabs{display:flex;gap:8px;background:var(--surface);border-radius:var(--radius);padding:4px}
.pin-role-tabs button{padding:8px 20px;border:none;background:transparent;color:var(--text2);border-radius:8px;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.85rem;transition:all 0.2s}
.pin-role-tabs button.active{background:var(--surface3);color:var(--text)}
.pin-dots{display:flex;gap:12px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all 0.2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-btn{padding:18px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1.3rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s}
.pin-btn:hover{background:var(--surface2);border-color:var(--border2)}
.pin-btn:active{transform:scale(0.95)}
.pin-error{color:var(--red);font-size:0.8rem;min-height:1.2em;text-align:center}
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.topbar-brand{font-size:1rem;font-weight:600;color:var(--accent);letter-spacing:-0.02em}
.topbar-info{display:flex;align-items:center;gap:16px;font-size:0.8rem;color:var(--text2)}
.logout-btn{background:transparent;border:0.5px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.75rem;transition:all 0.2s}
.logout-btn:hover{border-color:var(--border2);color:var(--text)}
.main-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);padding:0 24px;gap:0;overflow-x:auto}
.tab-btn{padding:12px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.85rem;transition:all 0.2s;margin-bottom:-0.5px;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text)}
.content{padding:24px;max-width:820px;margin:0 auto;width:100%}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.card-title{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:500}
.status-badge.work{background:rgba(74,222,128,0.12);color:var(--green);border:0.5px solid rgba(74,222,128,0.3)}
.status-badge.off{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border)}
.status-badge.overtime{background:rgba(232,200,74,0.12);color:var(--accent);border:0.5px solid rgba(232,200,74,0.3)}
.status-badge.edited{background:rgba(96,165,250,0.12);color:var(--blue);border:0.5px solid rgba(96,165,250,0.3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.time-display{font-family:'JetBrains Mono',monospace;font-size:2.8rem;font-weight:400;color:var(--text);letter-spacing:-0.02em;line-height:1}
.btn{padding:12px 24px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.9rem;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#0f0f11}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{background:rgba(248,113,113,0.15);color:var(--red);border:0.5px solid rgba(248,113,113,0.3)}
.btn-danger:hover{background:rgba(248,113,113,0.25)}
.btn-secondary{background:var(--surface2);color:var(--text);border:0.5px solid var(--border)}
.btn-secondary:hover{background:var(--surface3)}
.btn-ghost{background:transparent;color:var(--text2);border:0.5px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn:disabled{opacity:0.4;cursor:not-allowed;filter:none}
.btn-sm{padding:7px 14px;font-size:0.8rem}
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:0.5px solid var(--border)}
.checklist-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:1px}
.check-box.checked{background:var(--green);border-color:var(--green)}
.check-box.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:600}
.check-box.na{background:var(--surface3);border-color:var(--border2)}
.check-box.na::after{content:'—';color:var(--text3);font-size:11px}
.check-label{flex:1;font-size:0.9rem;line-height:1.4;cursor:pointer}
.check-label.done{text-decoration:line-through;color:var(--text2)}
.check-freq{font-size:0.7rem;color:var(--text3);margin-top:2px}
.comment-field{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.8rem;resize:none;outline:none}
.comment-field:focus{border-color:var(--accent)}
.salary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.salary-item{background:var(--surface2);border-radius:var(--radius);padding:14px}
.salary-item-label{font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.salary-item-value{font-family:'JetBrains Mono',monospace;font-size:1.2rem;color:var(--text)}
.salary-total{background:var(--surface2);border:0.5px solid rgba(232,200,74,0.4);border-radius:var(--radius);padding:16px;display:flex;justify-content:space-between;align-items:center}
.salary-total-label{font-size:0.8rem;color:var(--text2)}
.salary-total-value{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:500;color:var(--accent)}
.hist-table{width:100%;border-collapse:collapse}
.hist-table th{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--border)}
.hist-table td{padding:9px 10px;font-size:0.82rem;border-bottom:0.5px solid var(--border)}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:500}
.badge-green{background:rgba(74,222,128,0.12);color:var(--green)}
.badge-amber{background:rgba(232,200,74,0.12);color:var(--accent)}
.badge-red{background:rgba(248,113,113,0.12);color:var(--red)}
.badge-blue{background:rgba(96,165,250,0.12);color:var(--blue)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border-radius:12px;cursor:pointer;transition:0.2s}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--text2);border-radius:50%;transition:0.2s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px);background:#0f0f11}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.overtime-card{padding:16px;border-radius:var(--radius);border:0.5px solid rgba(232,200,74,0.3);background:rgba(232,200,74,0.06);margin-bottom:16px}
.weekend-notice{background:rgba(96,165,250,0.08);border:0.5px solid rgba(96,165,250,0.3);border-radius:var(--radius);padding:14px;margin-bottom:16px;font-size:0.85rem;color:var(--blue)}
.done-screen{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 20px;text-align:center}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:24px;max-width:500px;width:90%;position:relative;margin-bottom:40px}
.modal-title{font-size:1rem;font-weight:600;margin-bottom:16px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.2rem}
.form-row{margin-bottom:14px}
.form-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.9rem;outline:none}
.form-input:focus{border-color:var(--accent)}
.date-picker-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;border:0.5px solid var(--border)}
.date-picker-row label{font-size:0.8rem;color:var(--text2)}
.date-picker-row input[type=date]{background:transparent;border:none;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.9rem;outline:none;cursor:pointer}
.date-picker-row input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6)}
.edited-notice{background:rgba(96,165,250,0.08);border:0.5px solid rgba(96,165,250,0.3);border-radius:8px;padding:10px 14px;font-size:0.8rem;color:var(--blue);margin-bottom:14px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:0.9rem}
.settings-sub{font-size:0.75rem;color:var(--text3);margin-top:2px}
.settings-input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.9rem;outline:none;width:140px;text-align:right}
.settings-input:focus{border-color:var(--accent)}
.task-edit-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.task-edit-item:last-child{border-bottom:none}
.task-edit-name{flex:1;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:7px 10px;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.85rem;outline:none}
.task-edit-name:focus{border-color:var(--accent)}
select.form-input{cursor:pointer}
/* PRINT */
@media print{
  body{background:#fff;color:#000}
  #app{display:block!important}
  .topbar,.main-tabs,.no-print{display:none!important}
  #tab-salary{display:block!important}
  .card{border:1px solid #ddd;background:#fff;break-inside:avoid}
  .salary-total{background:#f9f9f9;border:1px solid #ccc}
  .salary-total-value{color:#000}
  .hist-table th,.hist-table td{color:#000;border-bottom:1px solid #eee}
  .salary-item{background:#f5f5f5}
  .salary-item-label,.salary-item-value{color:#000}
  .print-header{display:block!important}
}
.print-header{display:none;text-align:center;margin-bottom:20px}
.print-header h2{font-size:1.2rem;font-weight:600}
.print-header p{font-size:0.85rem;color:#666;margin-top:4px}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}.justify-between{justify-content:space-between}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.text-sm{font-size:0.8rem}.text-muted{color:var(--text2)}.text-mono{font-family:'JetBrains Mono',monospace}
.hidden{display:none!important}
.w-full{width:100%}
</style>
</head>
<body>

<div id="pin-screen">
  <div><div class="pin-logo">Домашний трекер</div><div class="pin-sub">Введите PIN-код</div></div>
  <div class="pin-role-tabs">
    <button class="active" onclick="selectRole('nanny')">Няня</button>
    <button onclick="selectRole('owner')">Хозяин</button>
  </div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinClear()" style="font-size:0.8rem;color:var(--text2)">сброс</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinBack()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div id="app" style="display:none;flex-direction:column">
  <div class="topbar">
    <div class="flex items-center gap-12">
      <span class="topbar-brand">Домашний трекер</span>
      <span id="role-badge" class="status-badge off"><span class="status-dot"></span> —</span>
    </div>
    <div class="topbar-info">
      <span id="today-date" style="font-size:0.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace"></span>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="main-tabs" id="tabs-row"></div>
  <div style="flex:1;overflow-y:auto">
    <div class="content" id="tab-nanny" style="display:none"></div>
    <div class="content" id="tab-history" style="display:none"></div>
    <div class="content" id="tab-salary" style="display:none"></div>
    <div class="content" id="tab-settings" style="display:none"></div>
  </div>
</div>

<!-- Comment Modal -->
<div class="modal-overlay" id="comment-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('comment-modal')">✕</button>
    <div class="modal-title">Причина невыполнения</div>
    <div class="text-sm text-muted mb-8">Укажите причину — пункт не войдёт в вычеты.</div>
    <textarea class="comment-field" id="modal-comment-text" rows="3" placeholder="Например: ребёнок был у бабушки..."></textarea>
    <div style="color:var(--red);font-size:0.72rem;margin-top:4px;display:none" id="modal-comment-err">Введите причину</div>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('comment-modal')">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveComment()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Edit Shift Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="closeModal('edit-modal')">✕</button>
    <div class="modal-title" id="edit-modal-title">Редактировать смену</div>
    <div id="edit-modal-body"></div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="addtask-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addtask-modal')">✕</button>
    <div class="modal-title">Добавить задачу</div>
    <div class="form-row"><label class="form-label">Название задачи</label><input class="form-input" id="newtask-label" placeholder="Например: Погладить одежду"></div>
    <div class="form-row"><label class="form-label">Уточнение (необязательно)</label><input class="form-input" id="newtask-sub" placeholder="Например: ~20 мин"></div>
    <div class="form-row"><label class="form-label">Периодичность</label>
      <select class="form-input" id="newtask-freq">
        <option value="daily">Каждый день</option>
        <option value="3x_week">3 раза в неделю</option>
        <option value="2x_week">2 раза в неделю</option>
      </select>
    </div>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('addtask-modal')">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveNewTask()">Добавить</button>
    </div>
  </div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzBKFRIvJiZyVgP8IlwRmFHbDJ4ZbRdAm9-QK0SkyCDqvAvkqpuDoV1wV8ovbSzfZjzkg/exec';
const NANNY_PIN = '1111';
const OWNER_PIN = '9999';

const DEFAULT_TASKS = [
  {id:'prep_school',label:'Подготовка к школе',sub:'30–60 мин',freq:'daily'},
  {id:'feed_lunch',label:'Покормить ребёнка обедом',sub:'',freq:'daily'},
  {id:'walk',label:'Прогулка',sub:'60–120 мин, если хорошая погода',freq:'daily'},
  {id:'play',label:'Игра без ТВ и телефонов',sub:'40–90 мин (90+ если не было прогулки)',freq:'daily'},
  {id:'laundry',label:'Стирка: закинуть / развесить / снять и сложить',sub:'',freq:'daily'},
  {id:'dishes',label:'Помыть посуду / загрузить посудомойку',sub:'',freq:'daily'},
  {id:'floors',label:'Протереть полы',sub:'3 раза в неделю',freq:'3x_week'},
  {id:'cooking',label:'Приготовить обед на 2 дня',sub:'2 раза в неделю',freq:'2x_week'},
];

const DEFAULT_CFG = {
  shiftBase: 7500,
  deductPerTask: 2000,
  monthlyRate: 160000,
  workDays: 31,
  hoursPerDay: 8,
  overtimeStartHour: 19,
};

let currentRole = 'nanny';
let pinBuffer = '';
let pendingCommentTaskId = null;
let pendingCommentDate = null;
let clockInterval = null;
let activeShiftDate = null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function today(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function load(k,def){ try{return JSON.parse(localStorage.getItem(k)||'null')||def;}catch{return def;} }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function getTasks(){ return load('tasks', DEFAULT_TASKS); }
function getCfg(){ return {...DEFAULT_CFG,...load('cfg',{})}; }
function hourlyRate(cfg){ return Math.round(cfg.monthlyRate/cfg.workDays/cfg.hoursPerDay); }

function getShift(date){ const s=load('shifts',{}); return s[date]||null; }
function saveShift(date,shift){ const s=load('shifts',{}); s[date]=shift; save('shifts',s); }
function getOrCreate(date){
  let s=getShift(date);
  if(!s){
    const dow=new Date(date).getDay();
    const isWe=(dow===0||dow===6);
    s={date,clockIn:null,clockOut:null,tasks:{},comments:{},overtime:false,weekendMode:isWe,salary:0,edited:false,bonus:0};
    saveShift(date,s);
  }
  return s;
}

function calcSalary(shift){
  const cfg=getCfg();
  const hr=hourlyRate(cfg);
  if(shift.weekendMode){
    if(!shift.clockIn) return {base:0,deduct:0,deductCount:0,overtimePay:0,bonus:shift.bonus||0,total:shift.bonus||0};
    const inM=toMins(shift.clockIn);
    const outM=shift.clockOut?toMins(shift.clockOut):toMins(nowTime());
    const hrs=Math.max(0,outM-inM)/60;
    const pay=Math.round(hrs*hr);
    const bonus=shift.bonus||0;
    return {base:0,deduct:0,deductCount:0,overtimePay:pay,bonus,total:pay+bonus};
  }
  const tasks=getTasks();
  let deductCount=0;
  tasks.forEach(t=>{ if(!shift.tasks[t.id]) deductCount++; });
  const deduct=Math.min(deductCount*cfg.deductPerTask,cfg.shiftBase);
  const base=cfg.shiftBase;
  let overtimePay=0;
  if(shift.overtime){
    const refTime=shift.clockOut||nowTime();
    const outM=toMins(refTime);
    const otMins=Math.max(0,outM-cfg.overtimeStartHour*60);
    overtimePay=Math.round(otMins/60*hr);
  }
  const bonus=shift.bonus||0;
  const total=Math.max(0,base-deduct)+overtimePay+bonus;
  return {base,deduct,deductCount,overtimePay,bonus,total};
}

function toMins(t){ const[h,m]=t.split(':').map(Number); return h*60+m; }
function elapsed(from,to){ const m=toMins(to)-toMins(from); return `${Math.floor(m/60)}ч ${m%60}м`; }
function checkAllDone(shift){ return getTasks().every(t=>shift.tasks[t.id]===true||shift.tasks[t.id]==='na'); }
function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',weekday:'short'}); }
function fmtMoney(n){ return Number(n).toLocaleString('ru-RU')+'₸'; }

// ─── PIN ─────────────────────────────────────────────────────────────────────
function selectRole(r){
  currentRole=r; pinBuffer=''; updateDots();
  document.getElementById('pin-error').textContent='';
  document.querySelectorAll('.pin-role-tabs button').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&r==='nanny')||(i===1&&r==='owner'));
  });
}
function pinPress(d){ if(pinBuffer.length>=4)return; pinBuffer+=d; updateDots(); if(pinBuffer.length===4)setTimeout(checkPin,100); }
function pinBack(){ pinBuffer=pinBuffer.slice(0,-1); updateDots(); }
function pinClear(){ pinBuffer=''; updateDots(); document.getElementById('pin-error').textContent=''; }
function updateDots(){ for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length); }
function checkPin(){
  const ok=(currentRole==='nanny'&&pinBuffer===NANNY_PIN)||(currentRole==='owner'&&pinBuffer===OWNER_PIN);
  if(ok) launchApp();
  else{ document.getElementById('pin-error').textContent='Неверный PIN'; pinBuffer=''; updateDots(); }
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────
function launchApp(){
  document.getElementById('pin-screen').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  const badge=document.getElementById('role-badge');
  if(currentRole==='nanny'){ badge.innerHTML='<span class="status-dot"></span> Няня'; badge.className='status-badge work'; }
  else{ badge.innerHTML='<span class="status-dot"></span> Хозяин'; badge.className='status-badge overtime'; }
  activeShiftDate=today();
  buildTabs(); showTab('nanny');
}

function buildTabs(){
  const tabs=document.getElementById('tabs-row');
  const list=currentRole==='owner'
    ?[{id:'nanny',label:'Смена'},{id:'history',label:'История'},{id:'salary',label:'Зарплата'},{id:'settings',label:'Настройки'}]
    :[{id:'nanny',label:'Смена'},{id:'history',label:'История'}];
  tabs.innerHTML=list.map(t=>`<button class="tab-btn" id="tab-btn-${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`).join('');
}

function showTab(id){
  ['nanny','history','salary','settings'].forEach(t=>{
    const el=document.getElementById('tab-'+t); if(el) el.style.display=t===id?'block':'none';
    const btn=document.getElementById('tab-btn-'+t); if(btn) btn.classList.toggle('active',t===id);
  });
  if(id==='nanny') renderNanny();
  if(id==='history') renderHistory();
  if(id==='salary') renderSalaryTab();
  if(id==='settings') renderSettings();
}

function logout(){
  if(clockInterval) clearInterval(clockInterval);
  document.getElementById('app').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
  pinBuffer=''; updateDots(); document.getElementById('pin-error').textContent='';
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ─── NANNY TAB ────────────────────────────────────────────────────────────────
function renderNanny(){
  const el=document.getElementById('tab-nanny');
  el.innerHTML='';
  if(clockInterval) clearInterval(clockInterval);

  // Date picker
  const pickerDiv=document.createElement('div');
  pickerDiv.className='date-picker-row no-print';
  const isToday=activeShiftDate===today();
  pickerDiv.innerHTML=`
    <label>📅 Дата смены:</label>
    <input type="date" id="shift-date-picker" value="${activeShiftDate}" max="${today()}" onchange="changeShiftDate(this.value)">

  `;

}

function renderWeekday(el,shift){
  const isViewOnly=currentRole==='owner';

  // Clock card
  const cc=document.createElement('div');
  cc.className='card';
  if(!shift.clockIn){
    cc.innerHTML=`<div class="card-title">Начало смены</div>
      ${isViewOnly
        ?`<div class="text-muted text-sm">Смена ещё не начата</div>`

  } else {

      <div class="card-title">Смена ${activeShiftDate}</div>
      <div class="flex items-center justify-between mb-8">
        <div><div style="font-size:0.75rem;color:var(--text3)">Приход</div><div class="text-mono" style="font-size:1.4rem">${shift.clockIn}</div></div>

          ?`<div><div style="font-size:0.75rem;color:var(--text3)">Уход</div><div class="text-mono" style="font-size:1.4rem">${shift.clockOut}</div></div>`

      </div>`;
  }

  clCard.innerHTML='<div class="card-title">Чек-лист</div>';
  const taskList=document.createElement('div');
  getTasks().forEach(task=>taskList.appendChild(buildTaskItem(task,shift,isViewOnly)));
  clCard.appendChild(taskList);
  el.appendChild(clCard);

    const otCard=document.createElement('div');
    otCard.className='overtime-card';
    const cfg=getCfg();
    otCard.innerHTML=`
      <div class="toggle-row">
        <div>
          <div style="font-weight:500;font-size:0.9rem">Переработка по просьбе</div>
          <div class="text-sm text-muted mt-8">Начисление с ${cfg.overtimeStartHour}:00 (~${hourlyRate(cfg)} ₸/час)</div>
        </div>
        <label class="toggle"><input type="checkbox" id="ot-toggle" ${shift.overtime?'checked':''} ${isViewOnly?'disabled':''} onchange="toggleOvertime(this.checked)"><span class="toggle-slider"></span></label>
      </div>`;
    el.appendChild(otCard);
  }

  // Done message
  if(allDone&&!shift.clockOut&&!isViewOnly){
    const msg=document.createElement('div');
    msg.className='done-screen';
    msg.innerHTML=`<div style="font-size:3rem">🎉</div><div style="font-size:1.4rem;font-weight:600;color:var(--green)">Чек-лист выполнен!</div><div class="text-muted" style="font-size:0.9rem">Рабочий день окончен — можно идти домой!<br>Или отметьте переработку, если остаётесь.</div>`;
    el.appendChild(msg);

  // Salary preview
  const salCard=document.createElement('div');
  salCard.className='card';
  renderSalaryCard(salCard,shift);
  el.appendChild(salCard);

function buildTaskItem(task,shift,readonly){
  const wrapper=document.createElement('div');
  wrapper.className='checklist-item';
  const state=shift.tasks[task.id];
  const comment=shift.comments[task.id]||'';
  const isChecked=state===true;
  const isNA=state==='na';
  const locked=!!shift.clockOut||readonly;

  wrapper.innerHTML=`
    <div class="check-box ${isChecked?'checked':isNA?'na':''}" onclick="${locked?'':'toggleTask(\''+task.id+'\')'}"></div>
    <div style="flex:1">
      <div class="check-label ${isChecked?'done':''}" onclick="${locked?'':'toggleTask(\''+task.id+'\')'}">${task.label}
        ${task.freq!=='daily'?`<span class="badge badge-blue" style="margin-left:6px">${task.freq==='3x_week'?'3×/нед':'2×/нед'}</span>`:''}
      </div>
      ${task.sub?`<div class="check-freq">${task.sub}</div>`:''}
      ${isNA&&comment?`<div style="font-size:0.78rem;color:var(--text2);margin-top:4px;background:var(--surface2);padding:6px 10px;border-radius:6px">📝 ${comment}</div>`:''}
      ${isNA&&!comment&&!locked?`<div style="color:var(--red);font-size:0.72rem;margin-top:4px">⚠ Введите причину (без вычета)</div>`:''}
    </div>
    ${!locked&&isNA?`<button class="btn btn-ghost btn-sm" onclick="openCommentModal('${task.id}')">💬</button>`:''}
  `;
  return wrapper;
}

function toggleTask(taskId){
  const shift=getOrCreate(activeShiftDate);
  if(shift.clockOut) return;
  const cur=shift.tasks[taskId];
  if(!cur){ shift.tasks[taskId]=true; }
  else if(cur===true){ shift.tasks[taskId]='na'; openCommentModal(taskId); }
  else{ delete shift.tasks[taskId]; delete shift.comments[taskId]; }
  saveShift(activeShiftDate,shift);
  renderNanny();
}

function openCommentModal(taskId){
  pendingCommentTaskId=taskId;
  pendingCommentDate=activeShiftDate;
  document.getElementById('modal-comment-text').value=getOrCreate(activeShiftDate).comments[taskId]||'';
  document.getElementById('modal-comment-err').style.display='none';
  document.getElementById('comment-modal').classList.add('open');
}
function saveComment(){
  const txt=document.getElementById('modal-comment-text').value.trim();
  if(!txt){ document.getElementById('modal-comment-err').style.display='block'; return; }
  const shift=getOrCreate(pendingCommentDate);
  shift.comments[pendingCommentTaskId]=txt;
  saveShift(pendingCommentDate,shift);
  closeModal('comment-modal');
  renderNanny();
}

function renderSalaryCard(el,shift){
  const {base,deduct,deductCount,overtimePay,bonus,total}=calcSalary(shift);
  const cfg=getCfg();
  el.innerHTML=`
    <div class="card-title">Расчёт за смену</div>
    <div class="salary-grid mb-8">
      <div class="salary-item"><div class="salary-item-label">База</div><div class="salary-item-value">${fmtMoney(base)}</div></div>
      <div class="salary-item"><div class="salary-item-label">Вычеты (${deductCount}×${fmtMoney(cfg.deductPerTask)})</div><div class="salary-item-value" style="color:${deduct>0?'var(--red)':'var(--text)'}">${deduct>0?'−'+fmtMoney(deduct):'—'}</div></div>
      <div class="salary-item"><div class="salary-item-label">Переработка</div><div class="salary-item-value" style="color:${overtimePay>0?'var(--accent)':'var(--text)'}">${overtimePay>0?'+'+fmtMoney(overtimePay):'—'}</div></div>
      <div class="salary-item"><div class="salary-item-label">Премия</div><div class="salary-item-value" style="color:${bonus>0?'var(--green)':'var(--text)'}">${bonus>0?'+'+fmtMoney(bonus):'—'}</div></div>
    </div>
    <div class="salary-total"><span class="salary-total-label">Итого за смену</span><span class="salary-total-value">${fmtMoney(total)}</span></div>`;
}

function clockIn(){
  const shift=getOrCreate(activeShiftDate);
  shift.clockIn=nowTime();
  saveShift(activeShiftDate,shift);
  renderNanny();
}
function clockOut(){
  const shift=getOrCreate(activeShiftDate);
  shift.clockOut=nowTime();
  const {total}=calcSalary(shift);
  shift.salary=total;
  saveShift(activeShiftDate,shift);
  syncToSheets(shift);
  renderNanny();
}
function toggleOvertime(val){
  const shift=getOrCreate(activeShiftDate);
  shift.overtime=val;
  saveShift(activeShiftDate,shift);
  renderNanny();
}
function startClock(){
  if(clockInterval) clearInterval(clockInterval);
  function tick(){ const el=document.getElementById('live-clock'); if(el) el.textContent=nowTime(); }
  tick(); clockInterval=setInterval(tick,10000);
}

// ─── EDIT MODAL ───────────────────────────────────────────────────────────────

    tasksHtml=`<div style="margin-top:16px"><div class="card-title">Задачи</div>`;

      const comment=shift.comments[t.id]||'';
      tasksHtml+=`
        <div class="checklist-item" style="gap:10px">
          <select style="background:var(--surface2);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);padding:4px 8px;font-family:'Geologica',sans-serif;font-size:0.8rem;outline:none" id="etask-${t.id}" onchange="editTaskState('${date}','${t.id}',this.value)">
            <option value="" ${!state?'selected':''}>Не отмечено (вычет)</option>
            <option value="true" ${state===true?'selected':''}>✓ Выполнено</option>

        </div>

  }

  body.innerHTML=`
    <div class="form-row">
      <label class="form-label">Приход</label>
      <input class="form-input" type="time" id="edit-clockin" value="${shift.clockIn||''}" onchange="editField('${date}','clockIn',this.value)">
    </div>
    <div class="form-row">
      <label class="form-label">Уход</label>
      <input class="form-input" type="time" id="edit-clockout" value="${shift.clockOut||''}" onchange="editField('${date}','clockOut',this.value)">
    </div>
    <div class="form-row">
      <label class="form-label">Тип дня</label>
      <select class="form-input" onchange="editField('${date}','weekendMode',this.value==='true')">

      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Переработка</label>

    </div>
    ${tasksHtml}
    <div class="flex gap-8 mt-16">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('edit-modal')">Закрыть</button>
      <button class="btn btn-primary btn-sm" onclick="finalizeEdit('${date}')">Сохранить и пересчитать</button>
    </div>`;
  document.getElementById('edit-modal').classList.add('open');
}

function editField(date,field,val){
  const shift=getOrCreate(date);
  shift[field]=val;
  shift.edited=true;
  shift.editedAt=new Date().toLocaleString('ru-RU');
  saveShift(date,shift);
}
function editTaskState(date,taskId,val){
  const shift=getOrCreate(date);
  if(val==='') delete shift.tasks[taskId];
  else if(val==='true') shift.tasks[taskId]=true;
  else shift.tasks[taskId]='na';
  shift.edited=true; shift.editedAt=new Date().toLocaleString('ru-RU');
  saveShift(date,shift);
  openEditModal(date);
}
function editTaskComment(date,taskId,val){
  const shift=getOrCreate(date);
  shift.comments[taskId]=val;
  saveShift(date,shift);
}
function finalizeEdit(date){
  const shift=getOrCreate(date);
  const {total}=calcSalary(shift);
  shift.salary=total;
  saveShift(date,shift);
  syncToSheets(shift);
  closeModal('edit-modal');
  renderHistory();
}

// ─── SALARY TAB ───────────────────────────────────────────────────────────────
function renderSalaryTab(){
  const el=document.getElementById('tab-salary');
  const shifts=load('shifts',{});
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  // Month filter
  const months=[...new Set(Object.keys(shifts).map(d=>d.slice(0,7)))].sort().reverse();
  const selectedMonth=load('selectedMonth',ym);

  const filtered=Object.values(shifts).filter(s=>s.date&&s.date.startsWith(selectedMonth)&&s.clockIn);

  let weekdayCount=0,weekendCount=0,overtimeCount=0,totalBase=0,totalDeduct=0,totalOT=0,totalBonus=0,totalAll=0;
  filtered.forEach(s=>{
    const {base,deduct,overtimePay,bonus,total}=calcSalary(s);
    if(s.weekendMode) weekendCount++;
    else weekdayCount++;
    if(s.overtime&&!s.weekendMode) overtimeCount++;
    totalBase+=base; totalDeduct+=deduct; totalOT+=overtimePay; totalBonus+=bonus; totalAll+=total;
  });

  // Bonus for month
  const monthBonus=load('monthBonus',{});
  const mb=monthBonus[selectedMonth]||0;
  const grandTotal=totalAll+mb;

  let html=`
    <div class="print-header"><h2>Расчётный листок</h2><p>Период: ${selectedMonth} | Сформировано: ${new Date().toLocaleDateString('ru-RU')}</p></div>
    <div class="card no-print">
      <div class="card-title">Период</div>
      <div class="flex items-center gap-12">
        <select class="form-input" style="width:180px" onchange="saveSelectedMonth(this.value)">
          ${months.map(m=>`<option value="${m}" ${m===selectedMonth?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Сводка за период</div>
      <div class="salary-grid mb-16">
        <div class="salary-item"><div class="salary-item-label">Будних смен</div><div class="salary-item-value">${weekdayCount}</div></div>
        <div class="salary-item"><div class="salary-item-label">Выходных смен</div><div class="salary-item-value">${weekendCount}</div></div>
        <div class="salary-item"><div class="salary-item-label">Переработок</div><div class="salary-item-value">${overtimeCount}</div></div>
        <div class="salary-item"><div class="salary-item-label">Всего смен</div><div class="salary-item-value">${filtered.length}</div></div>
      </div>
      <div class="salary-grid mb-8">
        <div class="salary-item"><div class="salary-item-label">База (будни)</div><div class="salary-item-value">${fmtMoney(totalBase)}</div></div>
        <div class="salary-item"><div class="salary-item-label">Вычеты</div><div class="salary-item-value" style="color:${totalDeduct>0?'var(--red)':'var(--text)'}">${totalDeduct>0?'−'+fmtMoney(totalDeduct):'—'}</div></div>
        <div class="salary-item"><div class="salary-item-label">Переработка</div><div class="salary-item-value" style="color:${totalOT>0?'var(--accent)':'var(--text)'}">${totalOT>0?'+'+fmtMoney(totalOT):'—'}</div></div>
        <div class="salary-item"><div class="salary-item-label">Премии (смены)</div><div class="salary-item-value" style="color:${totalBonus>0?'var(--green)':'var(--text)'}">${totalBonus>0?'+'+fmtMoney(totalBonus):'—'}</div></div>
      </div>
    </div>
    <div class="card no-print">
      <div class="card-title">Разовая премия за месяц</div>
      <div class="flex items-center gap-12">
        <input class="form-input" type="number" min="0" style="width:180px" value="${mb}" placeholder="0" id="month-bonus-input" onchange="saveMonthBonus('${selectedMonth}',Number(this.value))">
        <span class="text-muted text-sm">₸ — будет добавлено к итогу</span>
      </div>
    </div>
    <div class="salary-total" style="margin-bottom:16px">
      <span class="salary-total-label">ИТОГО К ВЫПЛАТЕ за ${selectedMonth}</span>
      <span class="salary-total-value">${fmtMoney(grandTotal)}</span>
    </div>`;

  // Detail table
  if(filtered.length){
    html+=`<div class="card">
      <div class="card-title">Детализация по сменам</div>
      <table class="hist-table"><thead><tr><th>Дата</th><th>Тип</th><th>База</th><th>Вычеты</th><th>Переработка</th><th>Премия</th><th>Итого</th></tr></thead><tbody>`;
    filtered.sort((a,b)=>a.date>b.date?1:-1).forEach(s=>{
      const {base,deduct,overtimePay,bonus,total}=calcSalary(s);
      const type=s.weekendMode?'Выходной':s.overtime?'Перераб.':'Будни';
      html+=`<tr>
        <td>${fmtDate(s.date)}${s.edited?'<span class="badge badge-gray" style="margin-left:4px">✎</span>':''}</td>
        <td>${type}</td>
        <td>${fmtMoney(base)}</td>
        <td style="color:${deduct>0?'var(--red)':'var(--text2)'}">${deduct>0?'−'+fmtMoney(deduct):'—'}</td>
        <td style="color:${overtimePay>0?'var(--accent)':'var(--text2)'}">${overtimePay>0?'+'+fmtMoney(overtimePay):'—'}</td>
        <td style="color:${bonus>0?'var(--green)':'var(--text2)'}">${bonus>0?'+'+fmtMoney(bonus):'—'}</td>
        <td class="text-mono" style="font-weight:500">${fmtMoney(total)}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  if(mb>0){
    html+=`<div class="card"><div class="card-title">Разовая премия</div><div class="flex items-center justify-between"><span>Премия за ${selectedMonth}</span><span class="text-mono" style="color:var(--green);font-size:1.1rem">+${fmtMoney(mb)}</span></div></div>`;
  }

  html+=`<div class="flex gap-8 no-print" style="margin-top:8px">
    <button class="btn btn-secondary" onclick="window.print()">🖨 Распечатать квиток</button>
  </div>`;

  el.innerHTML=html;
}

function saveSelectedMonth(val){ save('selectedMonth',val); renderSalaryTab(); }
function saveMonthBonus(month,val){ const mb=load('monthBonus',{}); mb[month]=val; save('monthBonus',mb); renderSalaryTab(); }

// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function renderSettings(){
  const el=document.getElementById('tab-settings');
  const cfg=getCfg();
  const tasks=getTasks();

  let html=`
    <div class="card">
      <div class="card-title">Сетка зарплаты</div>
      ${settingRow('Ставка за смену (₸)','shiftBase',cfg.shiftBase)}
      ${settingRow('Вычет за невыполненный пункт (₸)','deductPerTask',cfg.deductPerTask)}
      ${settingRow('Месячный фонд (₸)','monthlyRate',cfg.monthlyRate)}
      ${settingRow('Рабочих дней в месяце','workDays',cfg.workDays)}
      ${settingRow('Часов в рабочем дне','hoursPerDay',cfg.hoursPerDay)}
      ${settingRow('Начало переработки (час)','overtimeStartHour',cfg.overtimeStartHour)}
      <div style="margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border);font-size:0.8rem;color:var(--text2)">
        Ставка в час: <span class="text-mono" style="color:var(--accent)">${fmtMoney(hourlyRate(cfg))}/час</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Чек-лист — управление задачами</div>
      <div id="task-list-editor">`;

  tasks.forEach((t,i)=>{
    html+=`<div class="task-edit-item">
      <span style="font-size:0.75rem;color:var(--text3);width:20px">${i+1}</span>
      <input class="task-edit-name" value="${t.label}" onchange="updateTaskLabel(${i},this.value)" style="flex:1">
      <select style="background:var(--surface2);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);padding:4px 8px;font-size:0.75rem;outline:none" onchange="updateTaskFreq(${i},this.value)">
        <option value="daily" ${t.freq==='daily'?'selected':''}>Каждый день</option>
        <option value="3x_week" ${t.freq==='3x_week'?'selected':''}>3×/нед</option>
        <option value="2x_week" ${t.freq==='2x_week'?'selected':''}>2×/нед</option>
      </select>
      <button class="btn btn-danger btn-sm" onclick="deleteTask(${i})">✕</button>
    </div>`;
  });

  html+=`</div>
      <button class="btn btn-secondary btn-sm mt-12" onclick="document.getElementById('addtask-modal').classList.add('open')">+ Добавить задачу</button>
    </div>
    <div class="card">
      <div class="card-title">Сброс данных</div>
      <button class="btn btn-danger btn-sm" onclick="if(confirm('Сбросить ВСЕ данные?')){localStorage.clear();alert('Готово')}">Очистить все данные</button>
    </div>`;

  el.innerHTML=html;
}

function settingRow(label,key,val){
  return `<div class="settings-row">
    <div><div class="settings-label">${label}</div></div>
    <input class="settings-input" type="number" value="${val}" onchange="saveCfg('${key}',Number(this.value))">
  </div>`;
}
function saveCfg(key,val){ const cfg=getCfg(); cfg[key]=val; save('cfg',cfg); renderSettings(); }
function updateTaskLabel(i,val){ const t=getTasks(); t[i].label=val; save('tasks',t); }
function updateTaskFreq(i,val){ const t=getTasks(); t[i].freq=val; save('tasks',t); renderSettings(); }
function deleteTask(i){ if(!confirm('Удалить задачу?')) return; const t=getTasks(); t.splice(i,1); save('tasks',t); renderSettings(); }
function saveNewTask(){
  const label=document.getElementById('newtask-label').value.trim();
  if(!label) return;
  const sub=document.getElementById('newtask-sub').value.trim();
  const freq=document.getElementById('newtask-freq').value;
  const t=getTasks();
  t.push({id:'custom_'+Date.now(),label,sub,freq});
  save('tasks',t);
  closeModal('addtask-modal');
  renderSettings();
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
function syncToSheets(shift){
  const {deduct,overtimePay,bonus,total}=calcSalary(shift);
  fetch(SHEETS_URL,{
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({...shift,penalty:deduct,overtime_pay:overtimePay,bonus,total})
  }).catch(()=>{});
}
</script>
</body>
</html>
