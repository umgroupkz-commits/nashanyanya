<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Няня — Трекер смен</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#18181c;--surface2:#212126;--surface3:#2a2a30;
  --border:#2e2e36;--border2:#3d3d48;--text:#f0f0f4;--text2:#9090a0;--text3:#5a5a6a;
  --accent:#e8c84a;--green:#4ade80;--red:#f87171;--blue:#60a5fa;
  --radius:10px;--radius-lg:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Geologica',sans-serif;min-height:100vh;font-size:15px}
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:2rem}
.pin-logo{font-size:2.2rem;font-weight:600;letter-spacing:-0.03em;color:var(--accent);text-align:center}
.pin-sub{color:var(--text2);font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;text-align:center;margin-top:6px}
.pin-role-tabs{display:flex;gap:8px;background:var(--surface);border-radius:var(--radius);padding:4px}
.pin-role-tabs button{padding:8px 20px;border:none;background:transparent;color:var(--text2);border-radius:8px;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.85rem;transition:all 0.2s}
.pin-role-tabs button.active{background:var(--surface3);color:var(--text)}
.pin-dots{display:flex;gap:12px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all 0.2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-btn{padding:18px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1.3rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s}
.pin-btn:hover{background:var(--surface2);border-color:var(--border2)}
.pin-btn:active{transform:scale(0.95)}
.pin-error{color:var(--red);font-size:0.8rem;min-height:1.2em;text-align:center}
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.topbar-brand{font-size:1rem;font-weight:600;color:var(--accent);letter-spacing:-0.02em}
.topbar-info{display:flex;align-items:center;gap:16px}
.logout-btn{background:transparent;border:0.5px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.75rem;transition:all 0.2s}
.logout-btn:hover{border-color:var(--border2);color:var(--text)}
.main-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);padding:0 24px;overflow-x:auto}
.tab-btn{padding:12px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.85rem;transition:all 0.2s;margin-bottom:-0.5px;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text)}
.content{padding:24px;max-width:820px;margin:0 auto;width:100%}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.card-title{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:500}
.status-badge.work{background:rgba(74,222,128,0.12);color:var(--green);border:0.5px solid rgba(74,222,128,0.3)}
.status-badge.off{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border)}
.status-badge.ot{background:rgba(232,200,74,0.12);color:var(--accent);border:0.5px solid rgba(232,200,74,0.3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.btn{padding:12px 24px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.9rem;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#0f0f11}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{background:rgba(248,113,113,0.15);color:var(--red);border:0.5px solid rgba(248,113,113,0.3)}
.btn-danger:hover{background:rgba(248,113,113,0.25)}
.btn-secondary{background:var(--surface2);color:var(--text);border:0.5px solid var(--border)}
.btn-secondary:hover{background:var(--surface3)}
.btn-ghost{background:transparent;color:var(--text2);border:0.5px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-wa{background:#25d366;color:#fff;border:none}
.btn-wa:hover{filter:brightness(1.1)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-sm{padding:7px 14px;font-size:0.8rem}
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:0.5px solid var(--border)}
.checklist-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:1px}
.check-box.checked{background:var(--green);border-color:var(--green)}
.check-box.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:600}
.check-box.na{background:var(--surface3);border-color:var(--border2)}
.check-box.na::after{content:'—';color:var(--text3);font-size:11px}
.check-label{flex:1;font-size:0.9rem;line-height:1.4}
.check-label.done{text-decoration:line-through;color:var(--text2)}
.check-freq{font-size:0.7rem;color:var(--text3);margin-top:2px}
.salary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.salary-item{background:var(--surface2);border-radius:var(--radius);padding:14px}
.salary-item-label{font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.salary-item-value{font-family:'JetBrains Mono',monospace;font-size:1.2rem;color:var(--text)}
.salary-total{background:var(--surface2);border:0.5px solid rgba(232,200,74,0.4);border-radius:var(--radius);padding:16px;display:flex;justify-content:space-between;align-items:center}
.salary-total-label{font-size:0.8rem;color:var(--text2)}
.salary-total-value{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:500;color:var(--accent)}
.hist-table{width:100%;border-collapse:collapse}
.hist-table th{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--border)}
.hist-table td{padding:9px 10px;font-size:0.82rem;border-bottom:0.5px solid var(--border)}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:500}
.badge-green{background:rgba(74,222,128,0.12);color:var(--green)}
.badge-amber{background:rgba(232,200,74,0.12);color:var(--accent)}
.badge-blue{background:rgba(96,165,250,0.12);color:var(--blue)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:24px;max-width:500px;width:90%;position:relative;margin-bottom:40px}
.modal-title{font-size:1rem;font-weight:600;margin-bottom:16px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.2rem}
.form-row{margin-bottom:14px}
.form-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.9rem;outline:none}
.form-input:focus{border-color:var(--accent)}
select.form-input{cursor:pointer}
.date-picker-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;border:0.5px solid var(--border)}
.date-picker-row label{font-size:0.8rem;color:var(--text2)}
.date-picker-row input[type=date]{background:transparent;border:none;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.9rem;outline:none;cursor:pointer}
.date-picker-row input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6)}
.edited-notice{background:rgba(96,165,250,0.08);border:0.5px solid rgba(96,165,250,0.3);border-radius:8px;padding:10px 14px;font-size:0.8rem;color:var(--blue);margin-bottom:14px}
.warn-notice{background:rgba(248,113,113,0.08);border:0.5px solid rgba(248,113,113,0.3);border-radius:8px;padding:10px 14px;font-size:0.8rem;color:var(--red);margin-bottom:14px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.9rem;outline:none;width:150px;text-align:right}
.settings-input:focus{border-color:var(--accent)}
.task-edit-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.task-edit-item:last-child{border-bottom:none}
.task-edit-name{flex:1;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:7px 10px;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.85rem;outline:none}
.task-edit-name:focus{border-color:var(--accent)}
.weekend-notice{background:rgba(96,165,250,0.08);border:0.5px solid rgba(96,165,250,0.3);border-radius:var(--radius);padding:14px;margin-bottom:16px;font-size:0.85rem;color:var(--blue)}
.one-time-badge{background:rgba(232,200,74,0.12);color:var(--accent);border:0.5px solid rgba(232,200,74,0.3);border-radius:4px;font-size:0.7rem;padding:1px 7px;margin-left:6px}
.comment-field{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.8rem;resize:none;outline:none}
.comment-field:focus{border-color:var(--accent)}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}.justify-between{justify-content:space-between}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.text-sm{font-size:0.8rem}.text-muted{color:var(--text2)}.text-mono{font-family:'JetBrains Mono',monospace}
.hidden{display:none!important}.w-full{width:100%}
/* квиток preview */
.receipt-box{background:var(--surface2);border-radius:var(--radius);padding:16px;font-size:0.82rem;line-height:1.9;white-space:pre-wrap;font-family:'JetBrains Mono',monospace;color:var(--text2);max-height:340px;overflow-y:auto}
</style>
</head>
<body>

<div id="pin-screen">
  <div><div class="pin-logo">Домашний трекер</div><div class="pin-sub">Введите PIN-код</div></div>
  <div class="pin-role-tabs">
    <button class="active" onclick="selectRole('nanny')">Няня</button>
    <button onclick="selectRole('employer')">Работодатель</button>
  </div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button><button class="pin-btn" onclick="pinPress('2')">2</button><button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button><button class="pin-btn" onclick="pinPress('5')">5</button><button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button><button class="pin-btn" onclick="pinPress('8')">8</button><button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinClear()" style="font-size:0.8rem;color:var(--text2)">сброс</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinBack()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div id="app" style="display:none;flex-direction:column">
  <div class="topbar">
    <div class="flex items-center gap-12">
      <span class="topbar-brand">Домашний трекер</span>
      <span id="role-badge" class="status-badge off"><span class="status-dot"></span>—</span>
    </div>
    <div class="topbar-info">
      <span id="today-date" style="font-size:0.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace"></span>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="main-tabs" id="tabs-row"></div>
  <div style="flex:1;overflow-y:auto">
    <div class="content" id="tab-nanny" style="display:none"></div>
    <div class="content" id="tab-history" style="display:none"></div>
    <div class="content" id="tab-salary" style="display:none"></div>
    <div class="content" id="tab-settings" style="display:none"></div>
  </div>
</div>

<!-- Comment modal -->
<div class="modal-overlay" id="comment-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('comment-modal')">✕</button>
    <div class="modal-title">Причина невыполнения</div>
    <div class="text-sm text-muted mb-8">Укажите причину — пункт не войдёт в вычеты.</div>
    <textarea class="comment-field" id="modal-comment-text" rows="3" placeholder="Например: ребёнок был у бабушки..."></textarea>
    <div style="color:var(--red);font-size:0.72rem;margin-top:4px;display:none" id="modal-comment-err">Введите причину</div>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('comment-modal')">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveComment()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Close shift confirm modal -->
<div class="modal-overlay" id="close-confirm-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('close-confirm-modal')">✕</button>
    <div class="modal-title">Закрыть смену?</div>
    <div id="close-confirm-body"></div>
    <div class="flex gap-8 mt-16">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('close-confirm-modal')">Вернуться</button>
      <button class="btn btn-danger btn-sm" onclick="confirmClockOut()">Закрыть со вычетом</button>
    </div>
  </div>
</div>

<!-- Edit shift modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="closeModal('edit-modal')">✕</button>
    <div class="modal-title" id="edit-modal-title">Редактировать смену</div>
    <div id="edit-modal-body"></div>
  </div>
</div>

<!-- Add task modal -->
<div class="modal-overlay" id="addtask-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addtask-modal')">✕</button>
    <div class="modal-title" id="addtask-title">Добавить задачу</div>
    <div class="form-row"><label class="form-label">Название задачи</label><input class="form-input" id="newtask-label" placeholder="Например: Погладить одежду"></div>
    <div class="form-row"><label class="form-label">Уточнение (необязательно)</label><input class="form-input" id="newtask-sub" placeholder="Например: ~20 мин"></div>
    <div class="form-row" id="newtask-freq-row"><label class="form-label">Периодичность</label>
      <select class="form-input" id="newtask-freq">
        <option value="daily">Каждый день</option>
        <option value="mon-wed-fri">Пн, Ср, Пт</option>
        <option value="tue-thu">Вт, Чт</option>
        <option value="once">Разово (конкретная дата)</option>
      </select>
    </div>
    <div class="form-row hidden" id="newtask-date-row"><label class="form-label">Дата</label><input class="form-input" type="date" id="newtask-date"></div>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('addtask-modal')">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveNewTask()">Добавить</button>
    </div>
  </div>
</div>

<!-- Nanny self-edit modal -->
<div class="modal-overlay" id="nanny-edit-modal">
  <div class="modal" style="max-width:500px">
    <button class="modal-close" onclick="closeModal('nanny-edit-modal')">✕</button>
    <div class="modal-title">Редактировать запись</div>
    <div class="warn-notice" style="margin-bottom:14px">⚠ Работодатель увидит факт редактирования, время и причину.</div>
    <div class="form-row">
      <label class="form-label">Причина редактирования <span style="color:var(--red)">*</span></label>
      <input class="form-input" id="nanny-edit-reason" placeholder="Например: забыла отметить приход вовремя">
      <div style="color:var(--red);font-size:0.72rem;margin-top:4px;display:none" id="nanny-edit-reason-err">Укажите причину</div>
    </div>
    <div id="nanny-edit-body"></div>
    <div class="flex gap-8 mt-16">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('nanny-edit-modal')">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveNannyEdit()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Receipt modal -->
<div class="modal-overlay" id="receipt-modal">
  <div class="modal" style="max-width:540px">
    <button class="modal-close" onclick="closeModal('receipt-modal')">✕</button>
    <div class="modal-title">Расчётный листок</div>
    <div class="receipt-box" id="receipt-text"></div>
    <div class="flex gap-8 mt-16">
      <button class="btn btn-secondary btn-sm" onclick="copyReceipt()">📋 Копировать</button>
      <button class="btn btn-wa btn-sm" onclick="sendReceiptWA()">💬 WhatsApp</button>
    </div>
  </div>
</div>

<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycbzBKFRIvJiZyVgP8IlwRmFHbDJ4ZbRdAm9-QK0SkyCDqvAvkqpuDoV1wV8ovbSzfZjzkg/exec';
const NANNY_PIN='1111';
const EMPLOYER_PIN='9999';

const DEFAULT_TASKS=[
  {id:'prep_school',label:'Подготовка к школе',sub:'30–60 мин',freq:'daily'},
  {id:'feed_lunch',label:'Покормить ребёнка обедом',sub:'',freq:'daily'},
  {id:'walk',label:'Прогулка',sub:'60–120 мин, если хорошая погода',freq:'daily'},
  {id:'play',label:'Игра без ТВ и телефонов',sub:'40–90 мин (90+ если не было прогулки)',freq:'daily'},
  {id:'laundry',label:'Стирка: закинуть / развесить / снять и сложить',sub:'',freq:'daily'},
  {id:'dishes',label:'Помыть посуду / загрузить посудомойку',sub:'',freq:'daily'},
  {id:'floors',label:'Протереть полы',sub:'Пн, Ср, Пт',freq:'mon-wed-fri'},
  {id:'cooking',label:'Приготовить обед на 2 дня',sub:'Вт, Чт',freq:'tue-thu'},
];

const DEFAULT_CFG={shiftBase:7500,deductPerTask:2000,hourlyRate:1000,overtimeStartHour:19};

// day schedule
const DOW_NAMES=['вс','пн','вт','ср','чт','пт','сб'];
function dowOfDate(dateStr){ return new Date(dateStr+'T12:00:00').getDay(); }
function taskActiveOnDate(task,dateStr){
  const dow=dowOfDate(dateStr);
  if(task.freq==='daily') return true;
  if(task.freq==='mon-wed-fri') return [1,3,5].includes(dow);
  if(task.freq==='tue-thu') return [2,4].includes(dow);
  if(task.freq==='once') return task.onceDate===dateStr;
  return true;
}

let currentRole='nanny';
let pinBuffer='';
let pendingCommentTaskId=null;
let pendingCommentDate=null;
let clockInterval=null;
let activeShiftDate=null;
let receiptText='';

function today(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function pad(n){ return String(n).padStart(2,'0'); }
function load(k,def){ try{return JSON.parse(localStorage.getItem(k)||'null')||def;}catch{return def;} }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function getTasks(){ return load('tasks',DEFAULT_TASKS); }
function getCfg(){ return {...DEFAULT_CFG,...load('cfg',{})}; }
function getShift(date){ return (load('shifts',{}))[date]||null; }
function saveShift(date,shift){ const s=load('shifts',{}); s[date]=shift; save('shifts',s); }
function getOrCreate(date){
  let s=getShift(date);
  if(!s){
    const dow=dowOfDate(date);
    s={date,clockIn:null,clockOut:null,tasks:{},comments:{},overtime:false,weekendMode:(dow===0||dow===6),salary:0,edited:false,editedAt:null,bonus:0};
    saveShift(date,s);
  }
  return s;
}
function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',weekday:'short'}); }
function fmtMoney(n){ return Number(n||0).toLocaleString('ru-RU')+'₸'; }
function toMins(t){ if(!t) return 0; const[h,m]=t.split(':').map(Number); return h*60+m; }

function calcSalary(shift){
  const cfg=getCfg();
  const hr=cfg.hourlyRate;
  const date=shift.date||today();
  if(shift.weekendMode){
    if(!shift.clockIn) return {base:0,deduct:0,deductCount:0,overtimePay:0,bonus:shift.bonus||0,total:shift.bonus||0};
    const inM=toMins(shift.clockIn);
    const outM=shift.clockOut?toMins(shift.clockOut):toMins(nowTime());
    const hrs=Math.max(0,outM-inM)/60;
    const pay=Math.round(hrs*hr);
    const bonus=shift.bonus||0;
    return {base:0,deduct:0,deductCount:0,overtimePay:pay,bonus,total:pay+bonus};
  }
  const tasks=getTasks().filter(t=>taskActiveOnDate(t,date));
  let deductCount=0;
  tasks.forEach(t=>{ if(!shift.tasks[t.id]) deductCount++; });
  const cfg2=getCfg();
  const deduct=Math.min(deductCount*cfg2.deductPerTask,cfg2.shiftBase);
  const base=cfg2.shiftBase;
  // overtime: only if explicitly flagged OR clockOut meaningfully after overtimeStartHour (>15 min buffer)
  let overtimePay=0;
  if(shift.clockOut && shift.overtime){
    const outM=toMins(shift.clockOut);
    const otStartM=cfg2.overtimeStartHour*60;
    const otMins=outM-otStartM;
    if(otMins>15){ // at least 15 min past 19:00 to count
      overtimePay=Math.round(otMins/60*hr);
    }
  }
  const bonus=shift.bonus||0;
  const total=Math.max(0,base-deduct)+overtimePay+bonus;
  return {base,deduct,deductCount,overtimePay,bonus,total};
}

function checkAllDone(shift,date){
  const d=date||shift.date||today();
  return getTasks().filter(t=>taskActiveOnDate(t,d)).every(t=>shift.tasks[t.id]===true||shift.tasks[t.id]==='na');
}

// ─── PIN ─────────────────────────────────────────────────────────────────────
function selectRole(r){
  currentRole=r; pinBuffer=''; updateDots();
  document.getElementById('pin-error').textContent='';
  document.querySelectorAll('.pin-role-tabs button').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&r==='nanny')||(i===1&&r==='employer'));
  });
}
function pinPress(d){ if(pinBuffer.length>=4)return; pinBuffer+=d; updateDots(); if(pinBuffer.length===4)setTimeout(checkPin,100); }
function pinBack(){ pinBuffer=pinBuffer.slice(0,-1); updateDots(); }
function pinClear(){ pinBuffer=''; updateDots(); document.getElementById('pin-error').textContent=''; }
function updateDots(){ for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length); }
function checkPin(){
  const ok=(currentRole==='nanny'&&pinBuffer===NANNY_PIN)||(currentRole==='employer'&&pinBuffer===EMPLOYER_PIN);
  if(ok) launchApp();
  else{ document.getElementById('pin-error').textContent='Неверный PIN'; pinBuffer=''; updateDots(); }
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function launchApp(){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  const badge=document.getElementById('role-badge');
  badge.innerHTML=`<span class="status-dot"></span>${currentRole==='nanny'?'Няня':'Работодатель'}`;
  badge.className='status-badge '+(currentRole==='nanny'?'work':'ot');
  activeShiftDate=today();
  buildTabs();
  showTab(currentRole==='nanny'?'nanny':'history');
}
function buildTabs(){
  const tabs=document.getElementById('tabs-row');
  const list=currentRole==='employer'
    ?[{id:'history',label:'История'},{id:'salary',label:'Зарплата'},{id:'settings',label:'Настройки'}]
    :[{id:'nanny',label:'Смена'},{id:'history',label:'История'}];
  tabs.innerHTML=list.map(t=>`<button class="tab-btn" id="tab-btn-${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`).join('');
}
function showTab(id){
  ['nanny','history','salary','settings'].forEach(t=>{
    const e=document.getElementById('tab-'+t); if(e) e.style.display=t===id?'block':'none';
    const b=document.getElementById('tab-btn-'+t); if(b) b.classList.toggle('active',t===id);
  });
  if(id==='nanny') renderNanny();
  if(id==='history') renderHistory();
  if(id==='salary') renderSalaryTab();
  if(id==='settings') renderSettings();
}
function logout(){
  if(clockInterval) clearInterval(clockInterval);
  document.getElementById('app').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
  pinBuffer=''; updateDots(); document.getElementById('pin-error').textContent='';
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ─── NANNY TAB ────────────────────────────────────────────────────────────────
function renderNanny(){
  const el=document.getElementById('tab-nanny');
  el.innerHTML='';
  if(clockInterval) clearInterval(clockInterval);
  const isEmployer=currentRole==='employer';

  // Date picker
  const pickerDiv=document.createElement('div');
  pickerDiv.className='date-picker-row';
  const isToday=activeShiftDate===today();
  pickerDiv.innerHTML=`<label>📅 Дата:</label>
    <input type="date" value="${activeShiftDate}" max="${today()}" onchange="changeShiftDate(this.value)">
    ${!isToday?`<span class="badge badge-blue">Прошедшая дата</span>`:''}`;
  el.appendChild(pickerDiv);

  const shift=getOrCreate(activeShiftDate);

  if(shift.edited){
    const n=document.createElement('div');
    n.className='edited-notice';
    n.textContent='✎ Запись отредактирована'+(shift.editedAt?' ('+shift.editedAt+')':'');
    el.appendChild(n);
  }

  if(shift.weekendMode) renderWeekend(el,shift,isEmployer);
  else renderWeekday(el,shift,isEmployer);
}

function changeShiftDate(val){
  activeShiftDate=val;
  // Only mark as edited if it's a past date AND shift already has clockOut
  if(val!==today()){
    const s=getShift(val);
    if(s && s.clockOut && !s.edited){
      s.edited=true; s.editedAt=new Date().toLocaleString('ru-RU');
      saveShift(val,s);
    }
  }
  renderNanny();
}

function renderWeekend(el,shift,readonly){
  const cfg=getCfg();
  el.appendChild(mkEl('div','weekend-notice',`<strong>Выходной день</strong> — начисление почасовое с момента прихода (~${cfg.hourlyRate} ₸/час).`));
  const card=mkCard('Время работы');
  if(!shift.clockIn){
    if(!readonly) card.innerHTML+=`<button class="btn btn-primary" onclick="clockIn()">▶ Отметить приход</button>`;
    else card.innerHTML+=`<div class="text-muted text-sm">Смена не начата</div>`;
  } else {
    card.innerHTML+=`<div class="flex items-center justify-between mb-8">
      <div><div style="font-size:0.75rem;color:var(--text3)">Приход</div><div class="text-mono" style="font-size:1.4rem">${shift.clockIn}</div></div>
      ${shift.clockOut?`<div><div style="font-size:0.75rem;color:var(--text3)">Уход</div><div class="text-mono" style="font-size:1.4rem">${shift.clockOut}</div></div>`:`<div id="live-clock" style="font-family:'JetBrains Mono',monospace;font-size:1.8rem">--:--</div>`}
    </div>`;
    if(!shift.clockOut&&!readonly) card.innerHTML+=`<button class="btn btn-danger mt-12" onclick="tryClockOut()">■ Отметить уход</button>`;
    else if(shift.clockOut){
      const {total}=calcSalary(shift);
      card.innerHTML+=`<div class="salary-total mt-12"><span class="salary-total-label">Начислено за смену</span><span class="salary-total-value">${fmtMoney(total)}</span></div>`;
    }
  }
  el.appendChild(card);
  startClock();
}

function renderWeekday(el,shift,readonly){
  const cfg=getCfg();
  const date=activeShiftDate;
  const isNanny=currentRole==='nanny';
  const activeTasks=getTasks().filter(t=>taskActiveOnDate(t,date));
  const allDone=activeTasks.every(t=>shift.tasks[t.id]===true||shift.tasks[t.id]==='na');

  // Clock card
  const cc=mkCard(`Смена ${date}`);
  if(!shift.clockIn){
    if(!readonly){
      cc.innerHTML+=`<p class="text-muted text-sm mb-8">Нажмите, чтобы начать рабочий день</p>
        <button class="btn btn-primary" onclick="clockIn()">▶ Отметить приход</button>`;
    } else {
      cc.innerHTML+=`<div class="text-muted text-sm">Смена не начата</div>`;
    }
  } else {
    const otInfo=shift.clockOut&&shift.overtime
      ?`<span class="status-badge ot"><span class="status-dot"></span>Переработка с ${cfg.overtimeStartHour}:00</span>`:
      allDone?`<span class="status-badge work"><span class="status-dot"></span>Чек-лист выполнен</span>`:`<span class="status-badge off"><span class="status-dot"></span>На смене</span>`;
    const editBtnHtml=isNanny&&shift.clockOut?`<button class="btn btn-ghost btn-sm" onclick="openNannyEdit('${date}')">✎ Исправить</button>`:'';
    cc.innerHTML+=`<div class="flex items-center justify-between mb-8">
      <div><div style="font-size:0.75rem;color:var(--text3)">Приход</div><div class="text-mono" style="font-size:1.4rem">${shift.clockIn}</div></div>
      ${shift.clockOut?`<div style="text-align:right"><div style="font-size:0.75rem;color:var(--text3)">Уход</div><div class="text-mono" style="font-size:1.4rem">${shift.clockOut}</div></div>`:`<div id="live-clock" style="font-family:'JetBrains Mono',monospace;font-size:1.8rem">--:--</div>`}
    </div>
    <div class="flex items-center justify-between mt-12">
      ${otInfo}
      <div class="flex gap-8">
        ${!shift.clockOut&&!readonly?`<button class="btn btn-danger btn-sm" onclick="tryClockOut()">■ Уйти</button>`:''}
        ${editBtnHtml}
      </div>
    </div>
    ${shift.nannyEditReason?`<div style="margin-top:12px;font-size:0.78rem;color:var(--blue);background:rgba(96,165,250,0.08);border-radius:6px;padding:8px 12px">✎ Причина правки: ${shift.nannyEditReason} <span style="color:var(--text3)">(${shift.editedAt||''})</span></div>`:''}`
    ;
  }
  el.appendChild(cc);

  if(!shift.clockIn) return;

  // Checklist
  const clCard=mkCard('Чек-лист');
  const dow=dowOfDate(date);
  const dowName=DOW_NAMES[dow];
  clCard.innerHTML=`<div class="card-title">Чек-лист — ${fmtDate(date)}</div>`;
  activeTasks.forEach(task=>{
    clCard.appendChild(buildTaskItem(task,shift,readonly||!!shift.clockOut));
  });
  el.appendChild(clCard);

  // Done screen
  if(allDone&&!shift.clockOut&&!readonly){
    const msg=document.createElement('div');
    msg.style.cssText='display:flex;flex-direction:column;align-items:center;gap:16px;padding:32px 20px;text-align:center';
    msg.innerHTML=`<div style="font-size:3rem">🎉</div><div style="font-size:1.4rem;font-weight:600;color:var(--green)">Чек-лист выполнен!</div><div class="text-muted" style="font-size:0.9rem">Рабочий день окончен — можно идти домой!<br><span style="font-size:0.8rem;color:var(--text3)">Если остаётесь — уход после 19:00 засчитается как переработка автоматически.</span></div>`;
    el.appendChild(msg);
  }

  // Salary card
  const salCard=mkCard('');
  salCard.id='sal-card';
  renderSalaryCard(salCard,shift);
  el.appendChild(salCard);

  startClock();
}

function buildTaskItem(task,shift,locked){
  const wrapper=document.createElement('div');
  wrapper.className='checklist-item';
  const state=shift.tasks[task.id];
  const comment=shift.comments[task.id]||'';
  const isChecked=state===true,isNA=state==='na';
  wrapper.innerHTML=`
    <div class="check-box ${isChecked?'checked':isNA?'na':''}" onclick="${locked?'':'toggleTask(\''+task.id+'\')'}"></div>
    <div style="flex:1">
      <div class="check-label ${isChecked?'done':''}" onclick="${locked?'':'toggleTask(\''+task.id+'\')'}">${task.label}
        ${task.freq==='once'?`<span class="one-time-badge">разово</span>`:''}
      </div>
      ${task.sub?`<div class="check-freq">${task.sub}</div>`:''}
      ${isNA&&comment?`<div style="font-size:0.78rem;color:var(--text2);margin-top:4px;background:var(--surface2);padding:6px 10px;border-radius:6px">📝 ${comment}</div>`:''}
      ${isNA&&!comment&&!locked?`<div style="color:var(--red);font-size:0.72rem;margin-top:4px">⚠ Введите причину (без вычета)</div>`:''}
    </div>
    ${!locked&&isNA?`<button class="btn btn-ghost btn-sm" onclick="openCommentModal('${task.id}')">💬</button>`:''}`;
  return wrapper;
}

function toggleTask(taskId){
  const shift=getOrCreate(activeShiftDate);
  if(shift.clockOut) return;
  const cur=shift.tasks[taskId];
  if(!cur){
    shift.tasks[taskId]=true;
    saveShift(activeShiftDate,shift);
    renderNanny();
  } else if(cur===true){
    shift.tasks[taskId]='na';
    saveShift(activeShiftDate,shift);
    renderNanny();
    // open modal AFTER render so it's visible on top
    openCommentModal(taskId);
  } else {
    delete shift.tasks[taskId];
    delete shift.comments[taskId];
    saveShift(activeShiftDate,shift);
    renderNanny();
  }
}

function openCommentModal(taskId){
  pendingCommentTaskId=taskId; pendingCommentDate=activeShiftDate;
  document.getElementById('modal-comment-text').value=getOrCreate(activeShiftDate).comments[taskId]||'';
  document.getElementById('modal-comment-err').style.display='none';
  document.getElementById('comment-modal').classList.add('open');
}
function saveComment(){
  const txt=document.getElementById('modal-comment-text').value.trim();
  if(!txt){ document.getElementById('modal-comment-err').style.display='block'; return; }
  const shift=getOrCreate(pendingCommentDate);
  shift.comments[pendingCommentTaskId]=txt;
  saveShift(pendingCommentDate,shift);
  closeModal('comment-modal');
  renderNanny();
}

function renderSalaryCard(el,shift){
  const {base,deduct,deductCount,overtimePay,bonus,total}=calcSalary(shift);
  const cfg=getCfg();
  el.innerHTML=`<div class="card-title">Расчёт за смену</div>
    <div class="salary-grid mb-8">
      <div class="salary-item"><div class="salary-item-label">База</div><div class="salary-item-value">${fmtMoney(base)}</div></div>
      <div class="salary-item"><div class="salary-item-label">Вычеты (${deductCount}×${fmtMoney(cfg.deductPerTask)})</div><div class="salary-item-value" style="color:${deduct>0?'var(--red)':'var(--text)'}">${deduct>0?'−'+fmtMoney(deduct):'—'}</div></div>
      <div class="salary-item"><div class="salary-item-label">Переработка</div><div class="salary-item-value" style="color:${overtimePay>0?'var(--accent)':'var(--text)'}">${overtimePay>0?'+'+fmtMoney(overtimePay):'—'}</div></div>
      <div class="salary-item"><div class="salary-item-label">Премия</div><div class="salary-item-value" style="color:${bonus>0?'var(--green)':'var(--text)'}">${bonus>0?'+'+fmtMoney(bonus):'—'}</div></div>
    </div>
    <div class="salary-total"><span class="salary-total-label">Итого за смену</span><span class="salary-total-value">${fmtMoney(total)}</span></div>`;
}

function clockIn(){
  const shift=getOrCreate(activeShiftDate);
  shift.clockIn=nowTime();
  saveShift(activeShiftDate,shift);
  renderNanny();
}

function tryClockOut(){
  const shift=getOrCreate(activeShiftDate);
  const date=activeShiftDate;
  if(!shift.weekendMode){
    const activeTasks=getTasks().filter(t=>taskActiveOnDate(t,date));
    const unfinished=activeTasks.filter(t=>!shift.tasks[t.id]);
    if(unfinished.length>0){
      const cfg=getCfg();
      const deductAmt=Math.min(unfinished.length*cfg.deductPerTask,cfg.shiftBase);
      let body=`<div class="warn-notice">Есть невыполненные задачи. Укажите причину — тогда вычета не будет. Или закройте со вычетом.</div>`;
      body+=`<div style="font-size:0.8rem;color:var(--text3);margin-bottom:10px">Для каждой задачи можно вписать причину (тогда вычета нет) или оставить пустым (вычет −${fmtMoney(cfg.deductPerTask)}):</div>`;
      unfinished.forEach(t=>{
        body+=`<div style="margin-bottom:12px">
          <div style="font-size:0.85rem;margin-bottom:4px;color:var(--text)">${t.label}</div>
          <input id="close-reason-${t.id}" class="form-input" style="font-size:0.8rem;padding:7px 10px" placeholder="Причина (необязательно — оставьте пустым для вычета)">
        </div>`;
      });
      body+=`<div id="close-deduct-preview" style="font-size:0.8rem;color:var(--text2);margin-top:8px">Считаем вычеты...</div>`;
      document.getElementById('close-confirm-body').innerHTML=body;
      // store unfinished task ids for confirmClockOut
      document.getElementById('close-confirm-modal').dataset.tasks=JSON.stringify(unfinished.map(t=>t.id));
      document.getElementById('close-confirm-modal').classList.add('open');
      updateClosePreview();
      // live update preview as user types
      unfinished.forEach(t=>{
        const inp=document.getElementById('close-reason-'+t.id);
        if(inp) inp.addEventListener('input',updateClosePreview);
      });
      return;
    }
  }
  confirmClockOut();
}

function updateClosePreview(){
  const cfg=getCfg();
  const modal=document.getElementById('close-confirm-modal');
  const taskIds=JSON.parse(modal.dataset.tasks||'[]');
  let withDeduct=0;
  taskIds.forEach(id=>{
    const inp=document.getElementById('close-reason-'+id);
    if(!inp||!inp.value.trim()) withDeduct++;
  });
  const deductAmt=Math.min(withDeduct*cfg.deductPerTask,cfg.shiftBase);
  const preview=document.getElementById('close-deduct-preview');
  if(preview){
    if(withDeduct===0) preview.innerHTML=`<span style="color:var(--green)">✓ Вычетов нет — все причины указаны</span>`;
    else preview.innerHTML=`Вычет составит: <span style="color:var(--red);font-weight:500">−${fmtMoney(deductAmt)}</span> (${withDeduct} задач без причины)`;
  }
}

function confirmClockOut(){
  closeModal('close-confirm-modal');
  const shift=getOrCreate(activeShiftDate);
  // save any reasons entered in the modal
  const modal=document.getElementById('close-confirm-modal');
  const taskIds=JSON.parse(modal.dataset.tasks||'[]');
  taskIds.forEach(id=>{
    const inp=document.getElementById('close-reason-'+id);
    const reason=inp?inp.value.trim():'';
    if(reason){
      shift.tasks[id]='na';
      shift.comments[id]=reason;
    }
    // if no reason — task stays unset, deduct applies
  });
  const t=nowTime();
  shift.clockOut=t;
  if(!shift.weekendMode){
    const cfg=getCfg();
    const otMins=toMins(t)-cfg.overtimeStartHour*60;
    shift.overtime=otMins>15;
  }
  const {total}=calcSalary(shift);
  shift.salary=total;
  saveShift(activeShiftDate,shift);
  syncToSheets(shift);
  renderNanny();
}

function startClock(){
  if(clockInterval) clearInterval(clockInterval);
  function tick(){ const e=document.getElementById('live-clock'); if(e) e.textContent=nowTime(); }
  tick(); clockInterval=setInterval(tick,10000);
}

// ─── NANNY SELF-EDIT ──────────────────────────────────────────────────────────
function openNannyEdit(date){
  const shift=getOrCreate(date);
  const tasks=getTasks().filter(t=>taskActiveOnDate(t,date));
  document.getElementById('nanny-edit-reason').value='';
  document.getElementById('nanny-edit-reason-err').style.display='none';

  let body=`<div class="form-row"><label class="form-label">Приход</label>
    <input class="form-input" type="time" id="ne-clockin" value="${shift.clockIn||''}"></div>
  <div class="form-row"><label class="form-label">Уход</label>
    <input class="form-input" type="time" id="ne-clockout" value="${shift.clockOut||''}"></div>
  <div style="margin-top:4px"><div class="card-title">Задачи</div>`;
  tasks.forEach(t=>{
    const state=shift.tasks[t.id];
    const comment=shift.comments[t.id]||'';
    const isNA=state==='na';
    body+=`<div class="task-edit-item">
      <select id="ne-task-${t.id}" onchange="neToggleComment('${t.id}',this.value)"
        style="background:var(--surface2);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);padding:4px 8px;font-size:0.8rem;outline:none">
        <option value="" ${!state?'selected':''}>Не выполнено (вычет)</option>
        <option value="true" ${state===true?'selected':''}>✓ Выполнено</option>
        <option value="na" ${isNA?'selected':''}>— Без вычета (с причиной)</option>
      </select>
      <span style="font-size:0.85rem;flex:1">${t.label}</span>
    </div>
    <div id="ne-comment-wrap-${t.id}" style="padding:0 0 6px 0;display:${isNA?'block':'none'}">
      <input class="form-input" id="ne-comment-${t.id}" style="font-size:0.8rem;padding:6px 10px"
        placeholder="Причина невыполнения..." value="${comment}">
    </div>`;
  });
  body+=`</div>`;
  document.getElementById('nanny-edit-body').innerHTML=body;
  document.getElementById('nanny-edit-modal').classList.add('open');
  document.getElementById('nanny-edit-modal').dataset.date=date;
}

function neToggleComment(taskId, val){
  const wrap=document.getElementById('ne-comment-wrap-'+taskId);
  if(wrap) wrap.style.display=(val==='na')?'block':'none';
}

function saveNannyEdit(){
  const reason=document.getElementById('nanny-edit-reason').value.trim();
  if(!reason){ document.getElementById('nanny-edit-reason-err').style.display='block'; return; }
  const date=document.getElementById('nanny-edit-modal').dataset.date;
  const shift=getOrCreate(date);
  const tasks=getTasks().filter(t=>taskActiveOnDate(t,date));

  shift.clockIn=document.getElementById('ne-clockin').value||shift.clockIn;
  shift.clockOut=document.getElementById('ne-clockout').value||shift.clockOut;

  // re-check overtime with updated clockOut
  if(!shift.weekendMode&&shift.clockOut){
    const cfg=getCfg();
    const otMins=toMins(shift.clockOut)-cfg.overtimeStartHour*60;
    shift.overtime=otMins>15;
  }

  tasks.forEach(t=>{
    const sel=document.getElementById('ne-task-'+t.id);
    if(!sel) return;
    const val=sel.value;
    if(val==='') delete shift.tasks[t.id];
    else if(val==='true') shift.tasks[t.id]=true;
    else{
      shift.tasks[t.id]='na';
      const ci=document.getElementById('ne-comment-'+t.id);
      if(ci) shift.comments[t.id]=ci.value.trim();
    }
  });

  shift.edited=true;
  shift.nannyEditReason=reason;
  shift.editedAt=new Date().toLocaleString('ru-RU');
  shift.editedBy='nanny';

  const {total}=calcSalary(shift);
  shift.salary=total;
  saveShift(date,shift);
  syncToSheets(shift);
  closeModal('nanny-edit-modal');
  renderNanny();
}

// ─── HISTORY TAB ──────────────────────────────────────────────────────────────
function renderHistory(){
  const el=document.getElementById('tab-history');
  const shifts=load('shifts',{});
  const dates=Object.keys(shifts).filter(d=>shifts[d].clockIn).sort().reverse();
  let html=`<div class="card"><div class="card-title">История смен</div>`;
  if(!dates.length){
    html+=`<div class="text-muted text-sm" style="padding:20px 0;text-align:center">Нет данных</div>`;

      const s=shifts[d];
      const {deduct,total}=calcSalary(s);
      const badge=s.weekendMode?'<span class="badge badge-blue">Выходной</span>':s.overtime?'<span class="badge badge-amber">Переработка</span>':'<span class="badge badge-green">Будни</span>';
      const editMark=s.edited?(s.editedBy==='nanny'

        ?`<button class="btn btn-ghost btn-sm" onclick="openEditModal('${d}')">✎</button>`
        :`<button class="btn btn-ghost btn-sm" onclick="openNannyEdit('${d}')">✎</button>`;
      html+=`<tr>
        <td>${fmtDate(d)}${editMark}</td>

  }
  html+=`</div>`;
  el.innerHTML=html;
}

          onchange="editTaskState('${date}','${t.id}',this.value)">

      <input class="form-input" type="time" value="${shift.clockOut||''}" onchange="editField('${date}','clockOut',this.value)"></div>
    <div class="form-row"><label class="form-label">Тип дня</label>
      <select class="form-input" onchange="editField('${date}','weekendMode',this.value==='true')">
        <option value="false" ${!shift.weekendMode?'selected':''}>Будни</option>
        <option value="true" ${shift.weekendMode?'selected':''}>Выходной</option>
      </select></div>
    <div class="form-row"><label class="form-label">Переработка после ${cfg.overtimeStartHour}:00</label>
      <select class="form-input" onchange="editField('${date}','overtime',this.value==='true')">
        <option value="false" ${!shift.overtime?'selected':''}>Нет</option>
        <option value="true" ${shift.overtime?'selected':''}>Да — начислить</option>
      </select></div>
    <div class="form-row"><label class="form-label">Премия (₸)</label>
      <input class="form-input" type="number" min="0" value="${shift.bonus||0}" onchange="editField('${date}','bonus',Number(this.value))"></div>

    <div class="flex gap-8 mt-16" style="flex-wrap:wrap">
      <button class="btn btn-danger btn-sm" onclick="deleteShift('${date}')">🗑 Удалить запись</button>
      <div style="flex:1"></div>
      <button class="btn btn-secondary btn-sm" onclick="closeModal('edit-modal')">Закрыть</button>
      <button class="btn btn-primary btn-sm" onclick="finalizeEdit('${date}')">Сохранить ✓</button>
    </div>`;

}
function editField(date,field,val){
  const s=getOrCreate(date); s[field]=val; s.edited=true; s.editedAt=new Date().toLocaleString('ru-RU');
  saveShift(date,s);
}
function editTaskState(date,taskId,val){
  const s=getOrCreate(date);
  if(val==='') delete s.tasks[taskId];
  else if(val==='true') s.tasks[taskId]=true;
  else s.tasks[taskId]='na';
  s.edited=true; s.editedAt=new Date().toLocaleString('ru-RU');
  saveShift(date,s);
  // show/hide comment field inline without re-opening modal
  const wrap=document.getElementById('ec-wrap-'+taskId);
  if(wrap) wrap.style.display=(val==='na')?'block':'none';
}
function editTaskComment(date,taskId,val){
  const s=getOrCreate(date); s.comments[taskId]=val; saveShift(date,s);
}
function finalizeEdit(date){
  const s=getOrCreate(date);
  // recalc overtime based on clockOut
  if(!s.weekendMode && s.clockOut){
    const cfg=getCfg();
    // only auto-update if employer didn't manually set it (we keep manual override)
  }
  const {total}=calcSalary(s); s.salary=total;
  saveShift(date,s); syncToSheets(s);
  closeModal('edit-modal'); renderHistory();
}
function deleteShift(date){
  if(!confirm('Удалить запись за '+fmtDate(date)+'?\nЭто действие нельзя отменить.')) return;
  const shifts=load('shifts',{});
  delete shifts[date];
  save('shifts',shifts);
  closeModal('edit-modal');
  renderHistory();
}

        <div class="salary-item"><div class="salary-item-label">Вычеты</div><div class="salary-item-value" style="color:${totDeduct>0?'var(--red)':'var(--text)'}">${totDeduct>0?'−'+fmtMoney(totDeduct):'—'}</div></div>
        <div class="salary-item"><div class="salary-item-label">Переработка</div><div class="salary-item-value" style="color:${totOT>0?'var(--accent)':'var(--text)'}">${totOT>0?'+'+fmtMoney(totOT):'—'}</div></div>

        <td style="color:${r.overtimePay>0?'var(--accent)':'var(--text2)'}">${r.overtimePay>0?'+'+fmtMoney(r.overtimePay):'—'}</td>
        <td style="color:${r.bonus>0?'var(--green)':'var(--text2)'}">${r.bonus>0?'+'+fmtMoney(r.bonus):'—'}</td>

function showReceipt(selMonth){
  const shifts=load('shifts',{});
  const filtered=Object.values(shifts).filter(s=>s.date&&s.date.startsWith(selMonth)&&s.clockIn&&s.clockOut).sort((a,b)=>a.date>b.date?1:-1);

  txt+=`Выходных смен:     ${weCount}\n`;
  txt+=`С переработкой:    ${otCount}\n`;
  txt+=`Всего смен:        ${filtered.length}\n\n`;
  txt+=`💰 НАЧИСЛЕНИЯ\n`;

}

    html+=`<div class="task-edit-item">
      <span style="font-size:0.75rem;color:var(--text3);width:20px">${i+1}</span>

    <div class="card-title">Сброс</div>

function sRow(label,key,val){
  return `<div class="settings-row"><div><div style="font-size:0.9rem">${label}</div></div>
    <input class="settings-input" type="number" value="${val}" onchange="saveCfg('${key}',Number(this.value))"></div>`;
}
function saveCfg(key,val){ const c=getCfg(); c[key]=val; save('cfg',c); renderSettings(); }
function updateTaskLabel(i,val){ const t=getTasks(); t[i].label=val; save('tasks',t); }
function deleteTask(i){ if(!confirm('Удалить задачу?'))return; const t=getTasks(); t.splice(i,1); save('tasks',t); renderSettings(); }

function openAddTask(isOnce){
  document.getElementById('addtask-title').textContent=isOnce?'Разовая задача':'Добавить задачу';
  document.getElementById('newtask-label').value='';
  document.getElementById('newtask-sub').value='';
  document.getElementById('newtask-date').value=today();
  const freqSel=document.getElementById('newtask-freq');
  const freqRow=document.getElementById('newtask-freq-row');
  const dateRow=document.getElementById('newtask-date-row');
  if(isOnce){
    freqSel.value='once';
    freqRow.classList.add('hidden');
    dateRow.classList.remove('hidden');
  } else {
    freqSel.value='daily';
    freqRow.classList.remove('hidden');
    dateRow.classList.add('hidden');
  }
  document.getElementById('addtask-modal').classList.add('open');
}

document.getElementById('newtask-freq').addEventListener('change',function(){
  document.getElementById('newtask-date-row').classList.toggle('hidden',this.value!=='once');
});

function saveNewTask(){
  const label=document.getElementById('newtask-label').value.trim();
  if(!label) return;
  const sub=document.getElementById('newtask-sub').value.trim();
  const freq=document.getElementById('newtask-freq').value;
  const onceDate=freq==='once'?document.getElementById('newtask-date').value:null;
  const t=getTasks();
  t.push({id:'custom_'+Date.now(),label,sub,freq,onceDate});
  save('tasks',t);
  closeModal('addtask-modal');
  renderSettings();
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
function syncToSheets(shift){
  const {deduct,overtimePay,bonus,total}=calcSalary(shift);
  const nannyReason=shift.nannyEditReason||'';
  const params=new URLSearchParams({
    date:shift.date||'',
    clockIn:shift.clockIn||'',
    clockOut:shift.clockOut||'',
    type:shift.weekendMode?'Выходной':shift.overtime?'Переработка':'Будни',
    deduct:String(deduct),
    overtime:String(overtimePay),
    bonus:String(bonus),
    total:String(total),
    edited:shift.edited?'да':'нет',
    editReason:nannyReason
  });
  // Use an image request — bypasses CORS for GET to Apps Script
  const img=new Image();
  img.src=SHEETS_URL+'?'+params.toString();
}

function syncAll(){
  const shifts=load('shifts',{});
  let count=0;
  Object.values(shifts).forEach(s=>{ if(s.clockOut){ syncToSheets(s); count++; } });
  const msg=document.getElementById('sync-msg');
  if(msg){
    msg.textContent='Отправляем '+count+' записей...';
    msg.style.color='var(--text2)';
    setTimeout(()=>{ msg.textContent='✓ Готово — проверьте таблицу'; msg.style.color='var(--green)'; },2000);
  }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function mkEl(tag,cls,html){ const e=document.createElement(tag); e.className=cls; e.innerHTML=html; return e; }
function mkCard(title){ const c=document.createElement('div'); c.className='card'; if(title) c.innerHTML=`<div class="card-title">${title}</div>`; return c; }
</script>
