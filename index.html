<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Работник — Трекер смен</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#18181c;--surface2:#212126;--surface3:#2a2a30;
  --border:#2e2e36;--border2:#3d3d48;--text:#f0f0f4;--text2:#9090a0;--text3:#5a5a6a;
  --accent:#e8c84a;--green:#4ade80;--red:#f87171;--blue:#60a5fa;
  --radius:10px;--radius-lg:16px;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Geologica',sans-serif;min-height:100vh;font-size:15px;-webkit-text-size-adjust:100%}
/* PIN */
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.5rem;padding:20px}
.pin-logo{font-size:2rem;font-weight:600;letter-spacing:-0.03em;color:var(--accent);text-align:center}
.pin-sub{color:var(--text2);font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;text-align:center;margin-top:6px}
.pin-role-tabs{display:flex;gap:8px;background:var(--surface);border-radius:var(--radius);padding:4px}
.pin-role-tabs button{padding:10px 24px;border:none;background:transparent;color:var(--text2);border-radius:8px;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.9rem;transition:all 0.2s}
.pin-role-tabs button.active{background:var(--surface3);color:var(--text)}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all 0.2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:min(280px,90vw)}
.pin-btn{padding:20px 10px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1.4rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.pin-btn:active{transform:scale(0.93);background:var(--surface3)}
.pin-error{color:var(--red);font-size:0.8rem;min-height:1.2em;text-align:center}
/* APP SHELL */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.topbar-brand{font-size:0.95rem;font-weight:600;color:var(--accent);letter-spacing:-0.02em}
.topbar-info{display:flex;align-items:center;gap:10px}
.topbar-date{font-size:0.7rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.logout-btn{background:transparent;border:0.5px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.75rem;-webkit-tap-highlight-color:transparent}
.main-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);padding:0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.main-tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.85rem;transition:all 0.2s;margin-bottom:-0.5px;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:16px;max-width:600px;margin:0 auto;width:100%;padding-bottom:40px}
/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.card-title{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
/* STATUS */
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:500}
.status-badge.work{background:rgba(74,222,128,0.12);color:var(--green);border:0.5px solid rgba(74,222,128,0.3)}
.status-badge.off{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border)}
.status-badge.ot{background:rgba(232,200,74,0.12);color:var(--accent);border:0.5px solid rgba(232,200,74,0.3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
/* BUTTONS — large tap targets */
.btn{padding:13px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'Geologica',sans-serif;font-size:0.9rem;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;-webkit-tap-highlight-color:transparent}
.btn-primary{background:var(--accent);color:#0f0f11}
.btn-primary:active{filter:brightness(0.9)}
.btn-danger{background:rgba(248,113,113,0.15);color:var(--red);border:0.5px solid rgba(248,113,113,0.3)}
.btn-danger:active{background:rgba(248,113,113,0.28)}
.btn-secondary{background:var(--surface2);color:var(--text);border:0.5px solid var(--border)}
.btn-secondary:active{background:var(--surface3)}
.btn-ghost{background:transparent;color:var(--text2);border:0.5px solid var(--border)}
.btn-ghost:active{color:var(--text);background:var(--surface2)}
.btn-wa{background:#25d366;color:#fff;border:none}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:0.8rem;min-height:36px}
.btn-full{width:100%;margin-top:10px}
/* CHECKLIST */
.checklist-item{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:0.5px solid var(--border)}
.checklist-item:last-child{border-bottom:none}
.check-box{width:28px;height:28px;border-radius:8px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:0;-webkit-tap-highlight-color:transparent}
.check-box.checked{background:var(--green);border-color:var(--green)}
.check-box.checked::after{content:'✓';color:#fff;font-size:15px;font-weight:600}
.check-box.na{background:var(--surface3);border-color:var(--border2)}
.check-box.na::after{content:'—';color:var(--text3);font-size:12px}
.check-label{flex:1;font-size:0.92rem;line-height:1.4;padding-top:4px}
.check-label.done{text-decoration:line-through;color:var(--text2)}
.check-freq{font-size:0.72rem;color:var(--text3);margin-top:3px}
/* SALARY */
.salary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.salary-item{background:var(--surface2);border-radius:var(--radius);padding:12px}
.salary-item-label{font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.salary-item-value{font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:var(--text)}
.salary-total{background:var(--surface2);border:0.5px solid rgba(232,200,74,0.4);border-radius:var(--radius);padding:14px;display:flex;justify-content:space-between;align-items:center}
.salary-total-label{font-size:0.8rem;color:var(--text2)}
.salary-total-value{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:500;color:var(--accent)}
/* HISTORY CARDS (replaces table) */
.shift-card{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:0.5px solid var(--border)}
.shift-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.shift-card-date{font-weight:500;font-size:0.95rem}
.shift-card-total{font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:var(--accent);font-weight:500}
.shift-card-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:0.82rem}
.shift-card-row:last-child{border-bottom:none}
.shift-card-row-label{color:var(--text2)}
.shift-card-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px;width:100%;max-width:600px;position:relative;max-height:90vh;overflow-y:auto}
.modal-title{font-size:1rem;font-weight:600;margin-bottom:16px;padding-right:30px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.3rem;padding:4px;-webkit-tap-highlight-color:transparent}
/* FORMS */
.form-row{margin-bottom:14px}
.form-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Geologica',sans-serif;font-size:1rem;outline:none;-webkit-appearance:none}
.form-input:focus{border-color:var(--accent)}
select.form-input{cursor:pointer}
.date-picker-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;border:0.5px solid var(--border)}
.date-picker-row label{font-size:0.8rem;color:var(--text2);white-space:nowrap}
.date-picker-row input[type=date]{background:transparent;border:none;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.95rem;outline:none;cursor:pointer;flex:1}
.date-picker-row input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6);width:20px;height:20px}
.edited-notice{background:rgba(96,165,250,0.08);border:0.5px solid rgba(96,165,250,0.3);border-radius:8px;padding:10px 14px;font-size:0.8rem;color:var(--blue);margin-bottom:14px}
.warn-notice{background:rgba(248,113,113,0.08);border:0.5px solid rgba(248,113,113,0.3);border-radius:8px;padding:10px 14px;font-size:0.82rem;color:var(--red);margin-bottom:12px;line-height:1.5}
/* SETTINGS */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:0.5px solid var(--border);gap:12px}
.settings-row:last-child{border-bottom:none}
.settings-input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.95rem;outline:none;width:130px;text-align:right;-webkit-appearance:none}
.settings-input:focus{border-color:var(--accent)}
.task-edit-item{display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.task-edit-item:last-child{border-bottom:none}
.task-edit-name{flex:1;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.9rem;outline:none}
.task-edit-name:focus{border-color:var(--accent)}
/* MISC */
.weekend-notice{background:rgba(96,165,250,0.08);border:0.5px solid rgba(96,165,250,0.3);border-radius:var(--radius);padding:14px;margin-bottom:14px;font-size:0.85rem;color:var(--blue);line-height:1.5}
.one-time-badge{background:rgba(232,200,74,0.12);color:var(--accent);border:0.5px solid rgba(232,200,74,0.3);border-radius:4px;font-size:0.7rem;padding:1px 7px;margin-left:6px}
.comment-field{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Geologica',sans-serif;font-size:0.9rem;resize:none;outline:none}
.comment-field:focus{border-color:var(--accent)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:500}
.badge-green{background:rgba(74,222,128,0.12);color:var(--green)}
.badge-amber{background:rgba(232,200,74,0.12);color:var(--accent)}
.badge-blue{background:rgba(96,165,250,0.12);color:var(--blue)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.receipt-box{background:var(--surface2);border-radius:var(--radius);padding:14px;font-size:0.78rem;line-height:1.9;white-space:pre-wrap;font-family:'JetBrains Mono',monospace;color:var(--text2);max-height:300px;overflow-y:auto}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}.justify-between{justify-content:space-between}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.text-sm{font-size:0.8rem}.text-muted{color:var(--text2)}.text-mono{font-family:'JetBrains Mono',monospace}
.hidden{display:none!important}.w-full{width:100%}
/* OLD TABLE — only used in salary detail on desktop */
.hist-table{width:100%;border-collapse:collapse}
.hist-table th{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);padding:7px 8px;text-align:left;border-bottom:0.5px solid var(--border)}
.hist-table td{padding:8px;font-size:0.8rem;border-bottom:0.5px solid var(--border)}
.hist-table tr:last-child td{border-bottom:none}
</style>
</head>
<body>

<div id="pin-screen">
  <div><div class="pin-logo">Домашний трекер</div><div class="pin-sub">Введите PIN-код</div></div>
  <div class="pin-role-tabs">
    <button class="active" onclick="selectRole('nanny')">Работник</button>
    <button onclick="selectRole('employer')">Работодатель</button>
  </div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button><button class="pin-btn" onclick="pinPress('2')">2</button><button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button><button class="pin-btn" onclick="pinPress('5')">5</button><button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button><button class="pin-btn" onclick="pinPress('8')">8</button><button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinClear()" style="font-size:0.8rem;color:var(--text2)">сброс</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinBack()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div id="app" style="display:none;flex-direction:column">
  <div class="topbar">
    <div class="flex items-center gap-12">
      <span class="topbar-brand">Домашний трекер</span>
      <span id="role-badge" class="status-badge off"><span class="status-dot"></span>—</span>
    </div>
    <div class="topbar-info">
      <span id="today-date" style="font-size:0.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace"></span>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="main-tabs" id="tabs-row"></div>
  <div id="sync-status-bar" style="display:none;background:rgba(232,200,74,0.12);color:var(--accent);font-size:0.75rem;text-align:center;padding:6px;border-bottom:0.5px solid var(--border)"></div>
  <div style="flex:1;overflow-y:auto">
    <div class="content" id="tab-nanny" style="display:none"></div>
    <div class="content" id="tab-history" style="display:none"></div>
    <div class="content" id="tab-salary" style="display:none"></div>
    <div class="content" id="tab-settings" style="display:none"></div>
  </div>
</div>

<!-- Comment modal -->
<div class="modal-overlay" id="comment-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('comment-modal')">✕</button>
    <div class="modal-title">Причина невыполнения</div>
    <div class="text-sm text-muted mb-8">Укажите причину — пункт не войдёт в вычеты.</div>
    <textarea class="comment-field" id="modal-comment-text" rows="3" placeholder="Например: ребёнок был у бабушки..."></textarea>
    <div style="color:var(--red);font-size:0.72rem;margin-top:4px;display:none" id="modal-comment-err">Введите причину</div>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('comment-modal')">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveComment()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Close shift confirm modal -->
<div class="modal-overlay" id="close-confirm-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('close-confirm-modal')">✕</button>
    <div class="modal-title">Закрыть смену?</div>
    <div id="close-confirm-body"></div>
    <div class="flex gap-8 mt-16">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('close-confirm-modal')">Вернуться</button>
      <button class="btn btn-danger btn-sm" id="close-confirm-btn" onclick="confirmClockOut()">Закрыть со вычетом</button>
    </div>
  </div>
</div>

<!-- Edit shift modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="closeModal('edit-modal')">✕</button>
    <div class="modal-title" id="edit-modal-title">Редактировать смену</div>
    <div id="edit-modal-body"></div>
  </div>
</div>

<!-- Add task modal -->
<div class="modal-overlay" id="addtask-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addtask-modal')">✕</button>
    <div class="modal-title" id="addtask-title">Добавить задачу</div>
    <div class="form-row"><label class="form-label">Название задачи</label><input class="form-input" id="newtask-label" placeholder="Например: Погладить одежду"></div>
    <div class="form-row"><label class="form-label">Уточнение (необязательно)</label><input class="form-input" id="newtask-sub" placeholder="Например: ~20 мин"></div>
    <div class="form-row" id="newtask-freq-row"><label class="form-label">Периодичность</label>
      <select class="form-input" id="newtask-freq">
        <option value="daily">Каждый день</option>
        <option value="mon-wed-fri">Пн, Ср, Пт</option>
        <option value="tue-thu">Вт, Чт</option>
        <option value="once">Разово (конкретная дата)</option>
      </select>
    </div>
    <div class="form-row hidden" id="newtask-date-row"><label class="form-label">Дата</label><input class="form-input" type="date" id="newtask-date"></div>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('addtask-modal')">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveNewTask()">Добавить</button>
    </div>
  </div>
</div>

<!-- Nanny self-edit modal -->
<div class="modal-overlay" id="nanny-edit-modal">
  <div class="modal" style="max-width:500px">
    <button class="modal-close" onclick="closeModal('nanny-edit-modal')">✕</button>
    <div class="modal-title">Редактировать запись</div>
    <div class="warn-notice" style="margin-bottom:14px">⚠ Работодатель увидит факт редактирования, время и причину.</div>
    <div class="form-row">
      <label class="form-label">Причина редактирования <span style="color:var(--red)">*</span></label>
      <input class="form-input" id="nanny-edit-reason" placeholder="Например: забыла отметить приход вовремя">
      <div style="color:var(--red);font-size:0.72rem;margin-top:4px;display:none" id="nanny-edit-reason-err">Укажите причину</div>
    </div>
    <div id="nanny-edit-body"></div>
    <div class="flex gap-8 mt-16">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('nanny-edit-modal')">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveNannyEdit()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Receipt modal -->
<div class="modal-overlay" id="receipt-modal">
  <div class="modal" style="max-width:540px">
    <button class="modal-close" onclick="closeModal('receipt-modal')">✕</button>
    <div class="modal-title">Расчётный листок</div>
    <div class="receipt-box" id="receipt-text"></div>
    <div class="flex gap-8 mt-16">
      <button class="btn btn-secondary btn-sm" onclick="copyReceipt()">📋 Копировать</button>
      <button class="btn btn-wa btn-sm" onclick="sendReceiptWA()">💬 WhatsApp</button>
    </div>
  </div>
</div>

<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycbzBKFRIvJiZyVgP8IlwRmFHbDJ4ZbRdAm9-QK0SkyCDqvAvkqpuDoV1wV8ovbSzfZjzkg/exec';
const NANNY_PIN='1111';
const EMPLOYER_PIN='9999';

const DEFAULT_TASKS=[
  {id:'prep_school',label:'Подготовка к школе',sub:'30–60 мин',freq:'daily'},
  {id:'feed_lunch',label:'Покормить ребёнка обедом',sub:'',freq:'daily'},

const DOW_NAMES=['вс','пн','вт','ср','чт','пт','сб'];
function dowOfDate(dateStr){ return new Date(dateStr+'T12:00:00').getDay(); }
function taskActiveOnDate(task,dateStr){
  const dow=dowOfDate(dateStr);
  if(task.freq==='daily') return true;
  if(task.freq==='mon-wed-fri') return [1,3,5].includes(dow);
  if(task.freq==='tue-thu') return [2,4].includes(dow);
  if(task.freq==='once') return task.onceDate===dateStr;
  return true;
}

// ─── STORAGE: localStorage = fast cache, Sheets = source of truth ─────────────
function today(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function pad(n){ return String(n).padStart(2,'0'); }
function lsGet(k,def){ try{return JSON.parse(localStorage.getItem(k)||'null')||def;}catch{return def;} }
function lsSet(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

function getTasks(){ return lsGet('tasks',DEFAULT_TASKS); }
function getCfg(){ return {...DEFAULT_CFG,...lsGet('cfg',{})}; }
function getShift(date){ return (lsGet('shifts',{}))[date]||null; }

// Save to local cache only (fast, for checklist ticks)
function saveShiftLocal(date,shift){
  const all=lsGet('shifts',{}); all[date]=shift; lsSet('shifts',all);
}

// Save to local cache AND push to Sheets (for clockIn, clockOut, edits)
function saveShift(date,shift){
  const all=lsGet('shifts',{}); all[date]=shift; lsSet('shifts',all);
  sheetsWrite({action:'saveShift', date:date, shift:JSON.stringify(shift)});
}

function getOrCreate(date){
  let s=getShift(date);
  if(!s){
    const dow=dowOfDate(date);
    s={date,clockIn:null,clockOut:null,tasks:{},comments:{},overtime:false,
       weekendMode:(dow===0||dow===6),salary:0,edited:false,editedAt:null,bonus:0};
    const all=lsGet('shifts',{}); all[date]=s; lsSet('shifts',all);
  }
  return s;
}

// ─── GOOGLE SHEETS SYNC ───────────────────────────────────────────────────────

// WRITE: no-cors POST — always works, no response needed
function sheetsWrite(params){
  const qs=Object.entries(params)
    .map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(String(v))).join('&');
  // Use image trick for fire-and-forget GET (no-cors, no response)
  const img=new Image();
  img.src=SHEETS_URL+'?'+qs+'&_='+Date.now();
}

// READ: JSONP — loads via <script> tag, bypasses CORS completely
function sheetsRead(params, onSuccess, onError){
  const cbName='_scb'+Date.now()+'_'+Math.random().toString(36).slice(2);
  const qs=Object.entries(params)
    .map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(String(v))).join('&');
  const url=SHEETS_URL+'?'+qs+'&callback='+cbName;

  let done=false;
  window[cbName]=function(data){
    if(done) return; done=true;
    cleanup();
    if(data && data.ok) onSuccess(data);
    else onError(new Error(data&&data.error||'error'));
  };
  const script=document.createElement('script');
  script.src=url;
  script.onerror=function(){
    if(done) return; done=true;
    cleanup();
    onError(new Error('script load failed'));
  };
  document.head.appendChild(script);

  const timer=setTimeout(function(){
    if(done) return; done=true;
    cleanup();
    onError(new Error('timeout'));
  }, 15000);

  function cleanup(){
    clearTimeout(timer);
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
  }
}

// Save shift: update local cache instantly + write to Sheets in background
function saveShift(date, shift){
  const all=lsGet('shifts',{}); all[date]=shift; lsSet('shifts',all);
  sheetsWrite({action:'saveShift', date:date, shift:JSON.stringify(shift)});
}

// Load ALL from Sheets on app start
function loadAllFromSheets(onDone){
  showSyncStatus('⏳ Загружаем данные...');
  sheetsRead(
    {action:'getAll'},
    function(res){
      const d=res.data;
      if(d.shifts && Object.keys(d.shifts).length) lsSet('shifts', d.shifts);
      if(d.cfg)   lsSet('cfg',   d.cfg);
      if(d.tasks && d.tasks.length) lsSet('tasks', d.tasks);
      showSyncStatus('');
      onDone();
    },
    function(err){
      console.warn('Sheets load failed:', err.message);
      showSyncStatus('⚠ Офлайн режим');
      setTimeout(()=>showSyncStatus(''), 3000);
      onDone();
    }
  );
}

function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',weekday:'short'}); }
function fmtMoney(n){ return Number(n||0).toLocaleString('ru-RU')+'₸'; }
function toMins(t){ if(!t) return 0; const[h,m]=t.split(':').map(Number); return h*60+m; }

function calcSalary(shift){
  const cfg=getCfg();
  const hr=cfg.hourlyRate;
  const date=shift.date||today();
  if(shift.weekendMode){
    if(!shift.clockIn) return {base:0,deduct:0,deductCount:0,overtimePay:0,bonus:shift.bonus||0,total:shift.bonus||0};
    const inM=toMins(shift.clockIn);
    const outM=shift.clockOut?toMins(shift.clockOut):toMins(nowTime());
    const hrs=Math.max(0,outM-inM)/60;
    const pay=Math.round(hrs*hr);
    const bonus=shift.bonus||0;
    return {base:0,deduct:0,deductCount:0,overtimePay:pay,bonus,total:pay+bonus};
  }
  const tasks=getTasks().filter(t=>taskActiveOnDate(t,date));
  let deductCount=0;
  tasks.forEach(t=>{ if(!shift.tasks[t.id]) deductCount++; });
  const cfg2=getCfg();
  const deduct=Math.min(deductCount*cfg2.deductPerTask,cfg2.shiftBase);
  const base=cfg2.shiftBase;
  // Overtime: from max(clockIn, 19:00) to clockOut
  // So if arrived at 22:47 and left 23:49 → only 62 min counted, not from 19:00
  let overtimePay=0;
  if(shift.clockOut && shift.overtime){
    const outM=toMins(shift.clockOut);
    const otStartM=cfg2.overtimeStartHour*60;
    const inM=toMins(shift.clockIn||'09:00');
    // overtime starts at the later of: 19:00 OR clockIn
    const otFromM=Math.max(otStartM, inM);
    const otMins=outM-otFromM;
    if(otMins>15){
      overtimePay=Math.round(otMins/60*hr);
    }
  }
  const bonus=shift.bonus||0;
  const total=Math.max(0,base-deduct)+overtimePay+bonus;
  return {base,deduct,deductCount,overtimePay,bonus,total};
}

function checkAllDone(shift,date){
  const d=date||shift.date||today();
  return getTasks().filter(t=>taskActiveOnDate(t,d)).every(t=>shift.tasks[t.id]===true||shift.tasks[t.id]==='na');
}

      saveShift(val,s);

  renderNanny();
}

function buildTaskItem(task,shift,locked){
  const wrapper=document.createElement('div');
  wrapper.className='checklist-item';
  const state=shift.tasks[task.id];
  const comment=shift.comments[task.id]||'';
  const isChecked=state===true,isNA=state==='na';
  wrapper.innerHTML=`
    <div class="check-box ${isChecked?'checked':isNA?'na':''}" onclick="${locked?'':'toggleTask(\''+task.id+'\')'}"></div>
    <div style="flex:1">
      <div class="check-label ${isChecked?'done':''}" onclick="${locked?'':'toggleTask(\''+task.id+'\')'}">${task.label}
        ${task.freq==='once'?`<span class="one-time-badge">разово</span>`:''}
      </div>
      ${task.sub?`<div class="check-freq">${task.sub}</div>`:''}
      ${isNA&&comment?`<div style="font-size:0.78rem;color:var(--text2);margin-top:4px;background:var(--surface2);padding:6px 10px;border-radius:6px">📝 ${comment}</div>`:''}
      ${isNA&&!comment&&!locked?`<div style="color:var(--red);font-size:0.72rem;margin-top:4px">⚠ Введите причину (без вычета)</div>`:''}
    </div>
    ${!locked&&isNA?`<button class="btn btn-ghost btn-sm" onclick="openCommentModal('${task.id}')">💬</button>`:''}`;
  return wrapper;
}

function toggleTask(taskId){
  const shift=getOrCreate(activeShiftDate);
  if(shift.clockOut) return;
  const cur=shift.tasks[taskId];
  if(!cur){
    shift.tasks[taskId]=true;
    saveShiftLocal(activeShiftDate,shift);
    renderNanny();
  } else if(cur===true){
    shift.tasks[taskId]='na';
    saveShiftLocal(activeShiftDate,shift);
    renderNanny();
    openCommentModal(taskId);
  } else {
    delete shift.tasks[taskId];
    delete shift.comments[taskId];
    saveShiftLocal(activeShiftDate,shift);
    renderNanny();
  }
}

function openCommentModal(taskId){
  pendingCommentTaskId=taskId; pendingCommentDate=activeShiftDate;
  document.getElementById('modal-comment-text').value=getOrCreate(activeShiftDate).comments[taskId]||'';
  document.getElementById('modal-comment-err').style.display='none';
  document.getElementById('comment-modal').classList.add('open');
}
function saveComment(){
  const txt=document.getElementById('modal-comment-text').value.trim();
  if(!txt){ document.getElementById('modal-comment-err').style.display='block'; return; }
  const shift=getOrCreate(pendingCommentDate);
  shift.comments[pendingCommentTaskId]=txt;
  saveShiftLocal(pendingCommentDate,shift);
  closeModal('comment-modal');
  renderNanny();
}

}

function clockIn(){
  const shift=getOrCreate(activeShiftDate);
  shift.clockIn=nowTime();
  saveShift(activeShiftDate,shift);
  renderNanny();
}

function tryClockOut(){
  const shift=getOrCreate(activeShiftDate);
  const date=activeShiftDate;
  if(!shift.weekendMode){
    const activeTasks=getTasks().filter(t=>taskActiveOnDate(t,date));
    const unfinished=activeTasks.filter(t=>!shift.tasks[t.id]);
    if(unfinished.length>0){
      const cfg=getCfg();
      const deductAmt=Math.min(unfinished.length*cfg.deductPerTask,cfg.shiftBase);
      let body=`<div class="warn-notice">Есть невыполненные задачи. Укажите причину — тогда вычета не будет. Или закройте со вычетом.</div>`;
      body+=`<div style="font-size:0.8rem;color:var(--text3);margin-bottom:10px">Для каждой задачи можно вписать причину (тогда вычета нет) или оставить пустым (вычет −${fmtMoney(cfg.deductPerTask)}):</div>`;
      unfinished.forEach(t=>{
        body+=`<div style="margin-bottom:12px">
          <div style="font-size:0.85rem;margin-bottom:4px;color:var(--text)">${t.label}</div>
          <input id="close-reason-${t.id}" class="form-input" style="font-size:0.8rem;padding:7px 10px" placeholder="Причина (необязательно — оставьте пустым для вычета)">
        </div>`;
      });
      body+=`<div id="close-deduct-preview" style="font-size:0.8rem;color:var(--text2);margin-top:8px">Считаем вычеты...</div>`;
      document.getElementById('close-confirm-body').innerHTML=body;
      // store unfinished task ids for confirmClockOut
      document.getElementById('close-confirm-modal').dataset.tasks=JSON.stringify(unfinished.map(t=>t.id));
      document.getElementById('close-confirm-modal').classList.add('open');
      updateClosePreview();
      // live update preview as user types
      unfinished.forEach(t=>{
        const inp=document.getElementById('close-reason-'+t.id);
        if(inp) inp.addEventListener('input',updateClosePreview);
      });
      return;
    }
  }
  confirmClockOut();
}

function updateClosePreview(){
  const cfg=getCfg();
  const modal=document.getElementById('close-confirm-modal');
  const taskIds=JSON.parse(modal.dataset.tasks||'[]');
  let withDeduct=0;
  taskIds.forEach(id=>{
    const inp=document.getElementById('close-reason-'+id);
    if(!inp||!inp.value.trim()) withDeduct++;
  });
  const deductAmt=Math.min(withDeduct*cfg.deductPerTask,cfg.shiftBase);
  const preview=document.getElementById('close-deduct-preview');
  const btn=document.getElementById('close-confirm-btn');
  if(withDeduct===0){
    if(preview) preview.innerHTML=`<span style="color:var(--green)">✓ Вычетов нет — все причины указаны</span>`;
    if(btn){ btn.textContent='Закрыть смену ✓'; btn.className='btn btn-primary btn-sm'; }
  } else {
    if(preview) preview.innerHTML=`Вычет составит: <span style="color:var(--red);font-weight:500">−${fmtMoney(deductAmt)}</span> (${withDeduct} задач без причины)`;
    if(btn){ btn.textContent='Закрыть со вычетом'; btn.className='btn btn-danger btn-sm'; }
  }
}

function confirmClockOut(){
  closeModal('close-confirm-modal');
  const shift=getOrCreate(activeShiftDate);
  // save any reasons entered in the modal
  const modal=document.getElementById('close-confirm-modal');
  const taskIds=JSON.parse(modal.dataset.tasks||'[]');
  taskIds.forEach(id=>{
    const inp=document.getElementById('close-reason-'+id);
    const reason=inp?inp.value.trim():'';
    if(reason){
      shift.tasks[id]='na';
      shift.comments[id]=reason;
    }
    // if no reason — task stays unset, deduct applies
  });
  const t=nowTime();
  shift.clockOut=t;
  if(!shift.weekendMode){
    const cfg=getCfg();
    const outM=toMins(t);
    const inM=toMins(shift.clockIn||'09:00');
    const otFromM=Math.max(cfg.overtimeStartHour*60, inM);
    shift.overtime=(outM-otFromM)>15;
  }
  const {total}=calcSalary(shift);
  shift.salary=total;
  saveShift(activeShiftDate,shift);
  renderNanny();
}

function startClock(){
  if(clockInterval) clearInterval(clockInterval);
  function tick(){
    const e=document.getElementById('live-clock');
    if(e) e.textContent=nowTime();
    // Auto-close shift at midnight
    const now=new Date();
    if(now.getHours()===0 && now.getMinutes()===0){
      const shift=getShift(activeShiftDate);
      if(shift && shift.clockIn && !shift.clockOut){
        shift.clockOut='23:59';
        const cfg=getCfg();
        const inM=toMins(shift.clockIn);
        const otFromM=Math.max(cfg.overtimeStartHour*60, inM);
        shift.overtime=(toMins('23:59')-otFromM)>15;
        const {total}=calcSalary(shift);
        shift.salary=total;
        saveShift(activeShiftDate,shift);
        // show notification
        if('Notification' in window && Notification.permission==='granted'){
          new Notification('Смена закрыта автоматически', {body:'Смена закрыта в 23:59. Завтра откройте новую смену.'});
        }
        renderNanny();
      }
    }
  }
  tick();
  clockInterval=setInterval(tick,30000); // check every 30 sec
  // Request notification permission for midnight alert
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function saveNannyEdit(){
  const reason=document.getElementById('nanny-edit-reason').value.trim();
  if(!reason){ document.getElementById('nanny-edit-reason-err').style.display='block'; return; }
  const date=document.getElementById('nanny-edit-modal').dataset.date;
  const shift=getOrCreate(date);
  const tasks=getTasks().filter(t=>taskActiveOnDate(t,date));

  // Save time fields — always take field value if it's a valid HH:MM
  const newIn=document.getElementById('ne-clockin').value;
  const newOut=document.getElementById('ne-clockout').value;
  if(newIn) shift.clockIn=newIn;
  if(newOut) shift.clockOut=newOut;

  // Re-check overtime with corrected logic: from max(clockIn, 19:00) to clockOut
  if(!shift.weekendMode && shift.clockOut && shift.clockIn){
    const cfg=getCfg();
    const outM=toMins(shift.clockOut);
    const otStartM=cfg.overtimeStartHour*60;
    const inM=toMins(shift.clockIn);
    const otFromM=Math.max(otStartM, inM);
    const otMins=outM-otFromM;
    shift.overtime=otMins>15;
  }

  tasks.forEach(t=>{
    const sel=document.getElementById('ne-task-'+t.id);
    if(!sel) return;
    const val=sel.value;
    if(val==='') delete shift.tasks[t.id];
    else if(val==='true') shift.tasks[t.id]=true;
    else{
      shift.tasks[t.id]='na';
      const ci=document.getElementById('ne-comment-'+t.id);
      if(ci) shift.comments[t.id]=ci.value.trim();
    }
  });

  shift.edited=true;
  shift.nannyEditReason=reason;
  shift.editedAt=new Date().toLocaleString('ru-RU');
  shift.editedBy='nanny';

  const {total}=calcSalary(shift);
  shift.salary=total;
  saveShift(date,shift);
  closeModal('nanny-edit-modal');
  // Make sure we show the correct date after edit
  activeShiftDate=date;
  // If edited from history tab — stay on history, otherwise re-render nanny
  const histTab=document.getElementById('tab-history');
  if(histTab && histTab.style.display!=='none'){
    renderHistory();
  } else {
    renderNanny();
  }
}

function calcEditPreview(date){
  const s=getShift(date);
  if(!s||!s.clockIn) return `<span style="color:var(--text3);font-size:0.8rem">Укажите время прихода</span>`;
  // Simulate with current data
  const tmpShift={...s};
  if(tmpShift.clockIn&&tmpShift.clockOut){
    const cfg=getCfg();
    if(!tmpShift.weekendMode){
      const outM=toMins(tmpShift.clockOut);
      const inM=toMins(tmpShift.clockIn);
      const otFromM=Math.max(cfg.overtimeStartHour*60,inM);
      tmpShift.overtime=(outM-otFromM)>15;
    }
  }
  const r=calcSalary(tmpShift);
  return `<div style="font-size:0.75rem;color:var(--text3);margin-bottom:6px">ИТОГО ЗА СМЕНУ</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:1.4rem;color:var(--accent);font-weight:500">${fmtMoney(r.total)}</div>
    ${r.base>0?`<div style="font-size:0.78rem;color:var(--text2);margin-top:4px">База ${fmtMoney(r.base)}${r.deduct>0?' − вычеты '+fmtMoney(r.deduct):''}${r.overtimePay>0?' + переработка '+fmtMoney(r.overtimePay):''}</div>`:''}
    ${r.overtimePay>0&&!s.weekendMode?`<div style="font-size:0.78rem;color:var(--text3)">Переработка: с ${Math.floor(Math.max(getCfg().overtimeStartHour*60,toMins(s.clockIn))/60)}:${pad(Math.max(getCfg().overtimeStartHour*60,toMins(s.clockIn))%60)} до ${s.clockOut}</div>`:''}`;
}

function editField(date,field,val){
  const s=getOrCreate(date); s[field]=val; s.edited=true; s.editedAt=new Date().toLocaleString('ru-RU');
  saveShift(date,s);
  // Update live preview
  const prev=document.getElementById('edit-salary-preview');
  if(prev) prev.innerHTML=calcEditPreview(date);

function editTaskState(date,taskId,val){
  const s=getOrCreate(date);
  if(val==='') delete s.tasks[taskId];
  else if(val==='true') s.tasks[taskId]=true;
  else s.tasks[taskId]='na';
  s.edited=true; s.editedAt=new Date().toLocaleString('ru-RU');
  saveShift(date,s);
  // show/hide comment field inline without re-opening modal
  const wrap=document.getElementById('ec-wrap-'+taskId);
  if(wrap) wrap.style.display=(val==='na')?'block':'none';
}
function editTaskComment(date,taskId,val){
  const s=getOrCreate(date); s.comments[taskId]=val; saveShift(date,s);
}
function finalizeEdit(date){
  const s=getOrCreate(date);
  // Recalculate overtime flag based on current clockIn/clockOut
  if(s.clockIn && s.clockOut){
    if(s.weekendMode){
      s.overtime=false; // weekend uses hourly from clockIn, not overtime flag
    } else {
      const cfg=getCfg();
      const outM=toMins(s.clockOut);
      const inM=toMins(s.clockIn);
      const otFromM=Math.max(cfg.overtimeStartHour*60, inM);
      s.overtime=(outM-otFromM)>15;
    }
  }
  const {total}=calcSalary(s);
  s.salary=total;
  saveShift(date,s);
  closeModal('edit-modal');
  renderHistory();
}
function deleteShift(date){
  if(!confirm('Удалить запись за '+fmtDate(date)+'?\nЭто действие нельзя отменить.')) return;
  const shifts=lsGet('shifts',{});
  delete shifts[date];
  lsSet('shifts',shifts);
  sheetsRequest({action:'deleteShift',date});
  closeModal('edit-modal');
  renderHistory();
}

  let html=`

      <div class="card-title">Сводка</div>

        <div class="salary-item"><div class="salary-item-label">Всего смен</div><div class="salary-item-value">${filtered.length}</div></div>
      </div>
      <div class="salary-grid">
        <div class="salary-item"><div class="salary-item-label">База (будни)</div><div class="salary-item-value">${fmtMoney(totBase)}</div></div>
        <div class="salary-item"><div class="salary-item-label">Вычеты</div><div class="salary-item-value" style="color:${totDeduct>0?'var(--red)':'var(--text)'}">${totDeduct>0?'−'+fmtMoney(totDeduct):'—'}</div></div>
        <div class="salary-item"><div class="salary-item-label">Переработка</div><div class="salary-item-value" style="color:${totOT>0?'var(--accent)':'var(--text)'}">${totOT>0?'+'+fmtMoney(totOT):'—'}</div></div>
        <div class="salary-item"><div class="salary-item-label">Премии</div><div class="salary-item-value" style="color:${totBonus>0?'var(--green)':'var(--text)'}">${totBonus>0?'+'+fmtMoney(totBonus):'—'}</div></div>

    <div class="card">
      <div class="card-title">Разовая премия за месяц</div>

      </div>
    </div>
    <div class="salary-total mb-16">
      <span class="salary-total-label">ИТОГО К ВЫПЛАТЕ — ${selMonth}</span>
      <span class="salary-total-value">${fmtMoney(grand)}</span>
    </div>`;

  if(filtered.length){
    html+=`<div class="card"><div class="card-title">Детализация по дням</div>`;
    filtered.sort((a,b)=>a.date>b.date?1:-1).forEach(s=>{
      const r=calcSalary(s);
      const typeBadge=s.weekendMode?'<span class="badge badge-blue">Выходной</span>':r.overtimePay>0?'<span class="badge badge-amber">Переработка</span>':'<span class="badge badge-green">Будни</span>';
      html+=`<div class="shift-card" style="margin-bottom:8px">
        <div class="shift-card-header">
          <div>
            <div class="shift-card-date">${fmtDate(s.date)}${s.edited?'<span class="badge badge-gray" style="margin-left:4px">✎</span>':''}</div>
            <div style="margin-top:4px">${typeBadge} <span style="font-size:0.78rem;color:var(--text3)">${s.clockIn}→${s.clockOut}</span></div>
          </div>
          <div class="shift-card-total">${fmtMoney(r.total)}</div>
        </div>
        ${r.base>0?`<div class="shift-card-row"><span class="shift-card-row-label">База</span><span>${fmtMoney(r.base)}</span></div>`:''}
        ${r.deduct>0?`<div class="shift-card-row"><span class="shift-card-row-label">Вычеты</span><span style="color:var(--red)">−${fmtMoney(r.deduct)}</span></div>`:''}
        ${r.overtimePay>0?`<div class="shift-card-row"><span class="shift-card-row-label">Переработка</span><span style="color:var(--accent)">+${fmtMoney(r.overtimePay)}</span></div>`:''}
        ${r.bonus>0?`<div class="shift-card-row"><span class="shift-card-row-label">Премия</span><span style="color:var(--green)">+${fmtMoney(r.bonus)}</span></div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="flex gap-8" style="margin-top:8px">
    <button class="btn btn-secondary btn-sm" onclick="showReceipt('${selMonth}')">📄 Просмотреть квиток</button>

function saveSelMonth(v){ lsSet('selMonth',v); renderSalaryTab(); }
function saveMonthBonus(m,v){ const mb=load('monthBonus',{}); mb[m]=v; lsSet('monthBonus',mb); renderSalaryTab(); }

function renderSalaryWorker(el){
  const shifts=load('shifts',{});
  const now=new Date();
  const curYM=`${now.getFullYear()}-${pad(now.getMonth()+1)}`;
  const cfg=getCfg();
  const hr=cfg.hourlyRate;

  const filtered=Object.values(shifts).filter(s=>s.date&&s.date.startsWith(curYM)&&s.clockIn);
  let wdCount=0,weCount=0,otCount=0,totBase=0,totDeduct=0,totOT=0,totBonus=0,totAll=0;
  filtered.forEach(s=>{
    const r=calcSalary(s);
    if(s.weekendMode) weCount++; else wdCount++;
    if(r.overtimePay>0) otCount++;
    totBase+=r.base; totDeduct+=r.deduct; totOT+=r.overtimePay; totBonus+=r.bonus; totAll+=r.total;
  });
  const mb=load('monthBonus',{})[curYM]||0;
  const grand=totAll+mb;

  // Today's open shift estimate
  const todayShift=getShift(today());
  let todayEst='';
  if(todayShift&&todayShift.clockIn&&!todayShift.clockOut){
    const r=calcSalary({...todayShift,clockOut:nowTime()});
    todayEst=`<div class="edited-notice" style="margin-bottom:14px">📍 Текущая смена (в процессе): ~${fmtMoney(r.total)}</div>`;
  }

  let html=`${todayEst}
  <div class="salary-total mb-16">
    <span class="salary-total-label">Заработано за ${curYM}</span>
    <span class="salary-total-value">${fmtMoney(grand)}</span>
  </div>
  <div class="card">
    <div class="card-title">Детали за месяц</div>
    <div class="salary-grid mb-8">
      <div class="salary-item"><div class="salary-item-label">Будних смен</div><div class="salary-item-value">${wdCount}</div></div>
      <div class="salary-item"><div class="salary-item-label">Выходных смен</div><div class="salary-item-value">${weCount}</div></div>
      <div class="salary-item"><div class="salary-item-label">С переработкой</div><div class="salary-item-value">${otCount}</div></div>
      <div class="salary-item"><div class="salary-item-label">Всего смен</div><div class="salary-item-value">${filtered.length}</div></div>
    </div>
    <div class="shift-card-row"><span class="shift-card-row-label">База (будни)</span><span>${fmtMoney(totBase)}</span></div>
    ${totDeduct>0?`<div class="shift-card-row"><span class="shift-card-row-label">Вычеты</span><span style="color:var(--red)">−${fmtMoney(totDeduct)}</span></div>`:''}
    ${totOT>0?`<div class="shift-card-row"><span class="shift-card-row-label">Переработка</span><span style="color:var(--accent)">+${fmtMoney(totOT)}</span></div>`:''}
    ${totBonus>0?`<div class="shift-card-row"><span class="shift-card-row-label">Премии</span><span style="color:var(--green)">+${fmtMoney(totBonus)}</span></div>`:''}
    ${mb>0?`<div class="shift-card-row"><span class="shift-card-row-label">Разовая премия</span><span style="color:var(--green)">+${fmtMoney(mb)}</span></div>`:''}
  </div>`;

  // Per-day breakdown
  if(filtered.length){
    html+=`<div class="card"><div class="card-title">По дням</div>`;
    filtered.sort((a,b)=>a.date>b.date?-1:1).forEach(s=>{
      const r=calcSalary(s);
      const typeBadge=s.weekendMode?'<span class="badge badge-blue">Выходной</span>':r.overtimePay>0?'<span class="badge badge-amber">Переработка</span>':'<span class="badge badge-green">Будни</span>';
      html+=`<div class="shift-card" style="margin-bottom:8px">
        <div class="shift-card-header">
          <div><div class="shift-card-date">${fmtDate(s.date)}</div><div style="margin-top:4px">${typeBadge} <span style="font-size:0.78rem;color:var(--text3)">${s.clockIn}→${s.clockOut}</span></div></div>
          <div class="shift-card-total">${fmtMoney(r.total)}</div>
        </div>
        ${r.base>0?`<div class="shift-card-row"><span class="shift-card-row-label">База</span><span>${fmtMoney(r.base)}</span></div>`:''}
        ${r.deduct>0?`<div class="shift-card-row"><span class="shift-card-row-label">Вычеты</span><span style="color:var(--red)">−${fmtMoney(r.deduct)}</span></div>`:''}
        ${r.overtimePay>0?`<div class="shift-card-row"><span class="shift-card-row-label">Переработка</span><span style="color:var(--accent)">+${fmtMoney(r.overtimePay)}</span></div>`:''}
        ${r.bonus>0?`<div class="shift-card-row"><span class="shift-card-row-label">Премия</span><span style="color:var(--green)">+${fmtMoney(r.bonus)}</span></div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }

  // Rules reference
  html+=`<div class="card">
    <div class="card-title">Как начисляется зарплата</div>
    <div class="shift-card-row"><span class="shift-card-row-label">Ставка за смену (будни)</span><span>${fmtMoney(cfg.shiftBase)}</span></div>
    <div class="shift-card-row"><span class="shift-card-row-label">Вычет за невыполненный пункт</span><span style="color:var(--red)">−${fmtMoney(cfg.deductPerTask)}</span></div>
    <div class="shift-card-row"><span class="shift-card-row-label">Ставка в час (переработка/выходные)</span><span style="color:var(--accent)">${fmtMoney(hr)}/час</span></div>
    <div class="shift-card-row"><span class="shift-card-row-label">Переработка начинается с</span><span>${cfg.overtimeStartHour}:00</span></div>
    <div style="margin-top:12px;font-size:0.8rem;color:var(--text2);line-height:1.7;background:var(--surface2);border-radius:var(--radius);padding:12px">
      📌 <strong style="color:var(--text)">Важные правила:</strong><br>
      • Если все задачи выполнены — ставка ${fmtMoney(cfg.shiftBase)} полностью<br>
      • За каждый невыполненный пункт без причины — вычет ${fmtMoney(cfg.deductPerTask)} (но не ниже 0)<br>
      • Если указали причину — вычета нет<br>
      • Переработка считается с ${cfg.overtimeStartHour}:00 по ${fmtMoney(hr)}/час<br>
      • Если пришли после ${cfg.overtimeStartHour}:00 — переработка с момента прихода<br>
      • Выходные (сб/вс) — оплата с момента прихода по ${fmtMoney(hr)}/час<br>
      • Смена автоматически закрывается в 23:59 — новый день = новая смена
    </div>
  </div>`;

  el.innerHTML=html;
}

function showReceipt(selMonth){
  const shifts=load('shifts',{});
  const filtered=Object.values(shifts).filter(s=>s.date&&s.date.startsWith(selMonth)&&s.clockIn&&s.clockOut).sort((a,b)=>a.date>b.date?1:-1);
  let wdCount=0,weCount=0,otCount=0,totBase=0,totDeduct=0,totOT=0,totBonus=0,totAll=0;
  filtered.forEach(s=>{
    const r=calcSalary(s);
    if(s.weekendMode) weCount++; else wdCount++;
    if(r.overtimePay>0) otCount++;
    totBase+=r.base; totDeduct+=r.deduct; totOT+=r.overtimePay; totBonus+=r.bonus; totAll+=r.total;
  });
  const mb=load('monthBonus',{})[selMonth]||0;
  const grand=totAll+mb;
  const cfg=getCfg();

  let txt=``;
  txt+=`╔══════════════════════════════╗\n`;
  txt+=`║   РАСЧЁТНЫЙ ЛИСТОК           ║\n`;
  txt+=`║   Период: ${selMonth}          ║\n`;
  txt+=`╚══════════════════════════════╝\n\n`;
  txt+=`📊 СВОДКА\n`;
  txt+=`─────────────────────────────\n`;
  txt+=`Будних смен:       ${wdCount}\n`;
  txt+=`Выходных смен:     ${weCount}\n`;
  txt+=`С переработкой:    ${otCount}\n`;
  txt+=`Всего смен:        ${filtered.length}\n\n`;
  txt+=`💰 НАЧИСЛЕНИЯ\n`;
  txt+=`─────────────────────────────\n`;
  txt+=`База (${wdCount} × ${fmtMoney(cfg.shiftBase)}):   ${fmtMoney(totBase)}\n`;
  txt+=`Вычеты:            −${fmtMoney(totDeduct)}\n`;
  txt+=`Выходные/перераб.: +${fmtMoney(totOT)}\n`;
  txt+=`Премии по сменам:  +${fmtMoney(totBonus)}\n`;
  if(mb>0) txt+=`Разовая премия:    +${fmtMoney(mb)}\n`;
  txt+=`─────────────────────────────\n`;
  txt+=`ИТОГО К ВЫПЛАТЕ:   ${fmtMoney(grand)}\n\n`;
  txt+=`📋 ДЕТАЛИЗАЦИЯ\n`;
  txt+=`─────────────────────────────\n`;
  filtered.forEach(s=>{
    const r=calcSalary(s);
    const type=s.weekendMode?'вых':r.overtimePay>0?'пер':'буд';
    txt+=`${s.date} [${type}] ${fmtMoney(r.total)}`;
    if(r.deduct>0) txt+=` (вычет −${fmtMoney(r.deduct)})`;
    txt+=`\n`;
  });
  txt+=`\nСформировано: ${new Date().toLocaleString('ru-RU')}`;

  receiptText=txt;
  document.getElementById('receipt-text').textContent=txt;
  document.getElementById('receipt-modal').classList.add('open');
}

function copyReceipt(){
  navigator.clipboard.writeText(receiptText).then(()=>alert('Скопировано!')).catch(()=>alert('Не удалось скопировать'));
}
function sendReceiptWA(){
  const url='https://wa.me/?text='+encodeURIComponent(receiptText);
  window.open(url,'_blank');
}

// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function renderSettings(){
  const el=document.getElementById('tab-settings');
  const cfg=getCfg();
  const tasks=getTasks();

  let html=`<div class="card">
    <div class="card-title">Сетка зарплаты</div>
    ${sRow('Ставка за смену (₸)','shiftBase',cfg.shiftBase)}
    ${sRow('Вычет за невыполненный пункт (₸)','deductPerTask',cfg.deductPerTask)}
    ${sRow('Ставка в час (₸)','hourlyRate',cfg.hourlyRate)}
    ${sRow('Начало переработки (час)','overtimeStartHour',cfg.overtimeStartHour)}
    <div style="margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);font-size:0.8rem;color:var(--text2)">
      Переработка и выходные: <span class="text-mono" style="color:var(--accent)">${fmtMoney(cfg.hourlyRate)}/час</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Чек-лист — задачи</div>
    <div id="task-list-editor">`;

  tasks.forEach((t,i)=>{
    const freqLabel=t.freq==='daily'?'каждый день':t.freq==='mon-wed-fri'?'Пн,Ср,Пт':t.freq==='tue-thu'?'Вт,Чт':t.freq==='once'?`разово: ${t.onceDate||'?'}`:'?';
    html+=`<div class="task-edit-item">
      <span style="font-size:0.75rem;color:var(--text3);width:20px">${i+1}</span>
      <input class="task-edit-name" value="${t.label}" onchange="updateTaskLabel(${i},this.value)">
      <span style="font-size:0.75rem;color:var(--text3);white-space:nowrap">${freqLabel}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteTask(${i})">✕</button>
    </div>`;
  });

  html+=`</div>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-secondary btn-sm" onclick="openAddTask(false)">+ Постоянная задача</button>
      <button class="btn btn-ghost btn-sm" onclick="openAddTask(true)">+ Разовая задача</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Синхронизация</div>
    <div class="flex gap-8" style="flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="syncAll()">↓ Загрузить из таблицы</button>
      <button class="btn btn-ghost btn-sm" onclick="testConnection()">🔍 Проверить связь</button>
    </div>
    <div id="sync-msg" style="font-size:0.75rem;color:var(--text3);margin-top:8px"></div>
    <div id="sync-debug" style="font-size:0.72rem;color:var(--text3);margin-top:6px;font-family:'JetBrains Mono',monospace;word-break:break-all;max-height:120px;overflow-y:auto"></div>
  </div>
  <div class="card">
    <div class="card-title">Сброс</div>
    <button class="btn btn-danger btn-sm" onclick="if(confirm('Сбросить ВСЕ данные?')){localStorage.clear();alert('Готово')}">Очистить все данные</button>
  </div>`;

  el.innerHTML=html;
}

function sRow(label,key,val){
  return `<div class="settings-row"><div><div style="font-size:0.9rem">${label}</div></div>
    <input class="settings-input" type="number" value="${val}" onchange="saveCfg('${key}',Number(this.value))"></div>`;
}

function testConnection(){
  const dbg=document.getElementById('sync-debug');
  const msg=document.getElementById('sync-msg');
  if(msg){ msg.textContent='Проверяем...'; msg.style.color='var(--text2)'; }
  if(dbg) dbg.textContent='';
  sheetsRead(
    {action:'getAll'},
    function(res){
      const shifts=res.data&&res.data.shifts?Object.keys(res.data.shifts).length:0;
      if(msg){ msg.textContent=`✓ Связь есть! Смен в таблице: ${shifts}`; msg.style.color='var(--green)'; }
      if(dbg) dbg.textContent=JSON.stringify(res.data&&res.data.shifts?Object.keys(res.data.shifts):[]).slice(0,200);
      // Apply loaded data
      if(res.data){
        const d=res.data;
        if(d.shifts && Object.keys(d.shifts).length){ lsSet('shifts',d.shifts); }
        if(d.cfg) lsSet('cfg',d.cfg);
        if(d.tasks && d.tasks.length) lsSet('tasks',d.tasks);
      }
      renderHistory();
    },
    function(err){
      if(msg){ msg.textContent='✗ Ошибка: '+err.message; msg.style.color='var(--red)'; }
      if(dbg) dbg.textContent='URL: '+SHEETS_URL.slice(0,60)+'...';
    }
  );
}

function sRow(label,key,val){
  return `<div class="settings-row"><div><div style="font-size:0.9rem">${label}</div></div>
    <input class="settings-input" type="number" value="${val}" onchange="saveCfg('${key}',Number(this.value))"></div>`;
}
function saveCfg(key,val){ const c=getCfg(); c[key]=val; lsSet('cfg',c); syncSettings(); renderSettings(); }
function updateTaskLabel(i,val){ const t=getTasks(); t[i].label=val; lsSet('tasks',t); syncSettings(); }
function deleteTask(i){ if(!confirm('Удалить задачу?'))return; const t=getTasks(); t.splice(i,1); lsSet('tasks',t); syncSettings(); renderSettings(); }

function openAddTask(isOnce){
  document.getElementById('addtask-title').textContent=isOnce?'Разовая задача':'Добавить задачу';
  document.getElementById('newtask-label').value='';
  document.getElementById('newtask-sub').value='';
  document.getElementById('newtask-date').value=today();
  const freqSel=document.getElementById('newtask-freq');
  const freqRow=document.getElementById('newtask-freq-row');
  const dateRow=document.getElementById('newtask-date-row');
  if(isOnce){
    freqSel.value='once';
    freqRow.classList.add('hidden');
    dateRow.classList.remove('hidden');
  } else {
    freqSel.value='daily';
    freqRow.classList.remove('hidden');
    dateRow.classList.add('hidden');
  }
  document.getElementById('addtask-modal').classList.add('open');
}

document.getElementById('newtask-freq').addEventListener('change',function(){
  document.getElementById('newtask-date-row').classList.toggle('hidden',this.value!=='once');
});

function saveNewTask(){
  const label=document.getElementById('newtask-label').value.trim();
  if(!label) return;
  const sub=document.getElementById('newtask-sub').value.trim();
  const freq=document.getElementById('newtask-freq').value;
  const onceDate=freq==='once'?document.getElementById('newtask-date').value:null;
  const t=getTasks();
  t.push({id:'custom_'+Date.now(),label,sub,freq,onceDate});
  lsSet('tasks',t);
  syncSettings();
  closeModal('addtask-modal');
  renderSettings();
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
// saveShift already calls sheetsRequest — syncToSheets kept as alias for compatibility

function syncSettings(){
  sheetsRequest({
    action:'saveSettings',
    cfg:JSON.stringify(getCfg()),
    tasks:JSON.stringify(getTasks())
  });
}

function syncAll(){
  const msg=document.getElementById('sync-msg');
  if(msg){ msg.textContent='Загружаем все данные из таблицы...'; msg.style.color='var(--text2)'; }
  loadAllFromSheets(()=>{
    if(msg){ msg.textContent='✓ Данные обновлены'; msg.style.color='var(--green)'; }
    renderHistory();
  });
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function mkEl(tag,cls,html){ const e=document.createElement(tag); e.className=cls; e.innerHTML=html; return e; }
function mkCard(title){ const c=document.createElement('div'); c.className='card'; if(title) c.innerHTML=`<div class="card-title">${title}</div>`; return c; }
</script>
